<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bare Bones Boxes</title>
  <!-- controls_v38_monospace_click_accuracy: fix monospace click coordinate mapping for # big lines and tabs -->
  <style>
    :root {
      --panel-width: 260px;
      --grid-size: 24px;
      --grid-x: 0px;
      --grid-y: 0px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, sans-serif;
      background: #000;
    }

    #app {
      display: flex;
      width: 100vw;
      height: 100vh;
    }

    #sidePanel {
      width: var(--panel-width);
      min-width: var(--panel-width);
      height: 100vh;
      background: #101010;
      color: #f2f2f2;
      border-right: 1px solid #303030;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      font-size: 13px;
      z-index: 20;
    }

    #sidePanel button,
    #sidePanel input,
    #sidePanel select {
      width: 100%;
      font: inherit;
      border: 1px solid #555;
      border-radius: 4px;
      padding: 7px;
      background: #1c1c1c;
      color: #fff;
    }

    #sidePanel button {
      cursor: pointer;
      background: #222;
    }

    #sidePanel button:hover,
    .instanceItem:hover { background: #2a2a2a; }

    #newForm {
      display: grid;
      grid-template-columns: 1fr 64px;
      gap: 6px;
    }

    #newForm input,
    #newForm button { width: auto; }

    #instanceList {
      overflow-y: auto;
      min-height: 0;
      flex: 1 1 auto;
      border-top: 1px solid #303030;
      padding-top: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    #monospaceControl,
    #autoBoldControl,
    #firstLineHashControl {
      display: flex;
      align-items: center;
      gap: 7px;
      color: #ddd;
      cursor: pointer;
      user-select: none;
    }

    #monospaceControl {
      margin-top: auto;
      border-top: 1px solid #303030;
      padding-top: 8px;
    }

    #autoBoldControl,
    #firstLineHashControl {
      margin-top: 0;
    }

    #sidePanel #monospaceToggle,
    #sidePanel #autoBoldToggle,
    #sidePanel #firstLineHashToggle {
      width: auto;
      margin: 0;
      accent-color: #fff;
      cursor: pointer;
    }

    .instanceItem {
      border: 1px solid #333;
      border-radius: 5px;
      padding: 8px;
      cursor: pointer;
      user-select: none;
      background: #171717;
      display: block;
      min-height: 84px;
      height: 84px;
      overflow: hidden;
    }

    .instanceItem.active {
      outline: 1px solid #fff;
      background: #262626;
    }

    .instanceNameRow {
      height: 22px;
      line-height: 20px;
      display: flex;
      align-items: center;
      overflow: hidden;
      min-width: 0;
    }

    .instanceName {
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
      max-width: 100%;
      height: 20px;
      line-height: 20px;
      display: inline-block;
      flex: 0 1 auto;
    }

    .instanceMeta {
      color: #aaa;
      font-size: 11px;
      line-height: 1.25;
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 0;
      margin-top: 5px;
    }

    .instanceMeta > div {
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #sidePanel input.renameInput {
      width: var(--rename-width, 80px) !important;
      max-width: 100%;
      min-width: 48px;
      height: 20px;
      margin: 0;
      padding: 1px 4px;
      font: inherit;
      font-weight: 600;
      line-height: 16px;
      border: 1px solid #777;
      border-radius: 3px;
      background: #222;
      color: #fff;
      display: inline-block;
      flex: 0 0 auto;
      vertical-align: top;
    }

    #viewport {
      position: relative;
      flex: 1;
      height: 100vh;
      overflow: hidden;
      background-color: #000;
      background-image:
        linear-gradient(rgba(255,255,255,0.085) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.085) 1px, transparent 1px);
      background-size: var(--grid-size) var(--grid-size);
      background-position: var(--grid-x) var(--grid-y);
      cursor: grab;
    }

    #viewport.panning { cursor: grabbing; }
    #viewport.selecting { cursor: crosshair; }

    #world {
      position: absolute;
      left: 0;
      top: 0;
      width: 0;
      height: 0;
      transform-origin: 0 0;
    }

    #lines {
      position: absolute;
      left: 0;
      top: 0;
      overflow: visible;
      pointer-events: none;
      z-index: 1;
    }

    .linkLine { pointer-events: none; }
    .linkLine.selected { stroke-width: 4; }
    .linkHit { pointer-events: stroke; cursor: pointer; }

    .box {
      position: absolute;
      z-index: 2;
      min-width: 24px;
      min-height: 24px;
      max-width: 480px;
      width: fit-content;
      height: fit-content;
      padding: 3px 5px;
      border: 1px solid #222;
      border-radius: 0;
      background: #fff;
      color: #000;
      font: 16px/18px system-ui, sans-serif;
      white-space: pre-wrap;
      overflow-wrap: break-word;
      word-break: break-word;
      outline: none;
      cursor: text;
      user-select: text;
      tab-size: 4;
    }

    .box:empty::before {
      content: "\00a0";
    }

    .box .textLine {
      min-height: 18px;
      line-height: 18px;
      white-space: pre-wrap;
      overflow-wrap: break-word;
      word-break: break-word;
    }

    .box .textLine.bigLine {
      font-size: 32px;
      line-height: 36px;
      white-space: pre;
      overflow-wrap: normal;
      word-break: normal;
    }

    .monospaceText .box,
    #measureBox.monospaceMeasure {
      font-family: "Courier New", monospace;
    }

    .box.selected {
      outline: 2px solid #fff;
      outline-offset: 3px;
    }

    .box.linkArmed {
      box-shadow: 0 0 0 5px rgba(255,255,255,0.22);
    }

    .box.draggingBox {
      cursor: grabbing;
      user-select: none;
    }

    #marquee {
      position: absolute;
      border: 1px solid rgba(255,255,255,0.9);
      background: rgba(255,255,255,0.12);
      pointer-events: none;
      z-index: 10;
      display: none;
    }

    #measureBox {
      position: absolute;
      left: -100000px;
      top: -100000px;
      visibility: hidden;
      min-width: 24px;
      min-height: 24px;
      max-width: 480px;
      width: fit-content;
      padding: 3px 5px;
      border: 1px solid transparent;
      font: 16px/18px system-ui, sans-serif;
      white-space: pre-wrap;
      overflow-wrap: break-word;
      word-break: break-word;
      tab-size: 4;
    }

    #measureBox .textLine {
      min-height: 18px;
      line-height: 18px;
      white-space: pre-wrap;
      overflow-wrap: break-word;
      word-break: break-word;
    }

    #measureBox .textLine.bigLine {
      font-size: 32px;
      line-height: 36px;
      white-space: pre;
      overflow-wrap: normal;
      word-break: normal;
    }

    #formatToolbar,
    #lineButton {
      position: absolute;
      z-index: 30;
    }

    #formatToolbar {
      display: block;
      width: 0;
      height: 0;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: none !important;
      box-shadow: none !important;
      pointer-events: none;
      overflow: visible;
    }

    #formatToolbar[hidden],
    #lineButton[hidden],
    #controlHitLayer[hidden] { display: none; }

    #formatToolbar button,
    #lineButton {
      position: absolute;
      box-sizing: border-box;
      width: 36px;
      height: 36px;
      padding: 0;
      border: 1px solid #555;
      border-radius: 3px;
      background: #050505;
      color: #fff;
      font: 18px/1 system-ui, sans-serif;
      cursor: pointer;
      text-align: center;
      overflow: hidden;
      touch-action: none;
      pointer-events: auto;
      outline: none;
      box-shadow: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #formatToolbar button:hover,
    #formatToolbar button.hit-hover,
    #lineButton:hover,
    #lineButton.hit-hover { background: #2a2a2a; }

    #formatToolbar button.active,
    #lineButton.active {
      color: #000;
      background: #fff;
      border-color: #fff;
    }

    #formatToolbar button > span,
    #lineButton > span {
      pointer-events: none;
      font-size: 18px;
      line-height: 1;
    }

    #formatToolbar button[data-format="bold"] { font-weight: 700; }
    #formatToolbar button[data-format="italic"] { font-style: italic; }
    #formatToolbar button[data-format="underline"] { text-decoration: underline; }
    #formatToolbar button[data-format="strike"] { text-decoration: line-through; }

    #controlHitLayer {
      position: absolute;
      inset: 0;
      z-index: 31;
      pointer-events: none;
    }

    .controlHitZone {
      position: absolute;
      background: transparent;
      cursor: pointer;
      pointer-events: auto;
      touch-action: none;
    }

    body.control-hit,
    body.control-hit * {
      cursor: pointer !important;
    }

    #instanceMenu {
      position: fixed;
      z-index: 1000;
      min-width: 135px;
      background: #151515;
      border: 1px solid #555;
      border-radius: 5px;
      padding: 4px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.45);
    }

    #instanceMenu[hidden] { display: none; }

    #instanceMenu button {
      display: block;
      width: 100%;
      border: 0;
      border-radius: 3px;
      background: transparent;
      color: #fff;
      padding: 8px 10px;
      font: 13px system-ui, sans-serif;
      text-align: left;
      cursor: pointer;
    }

    #instanceMenu button:hover { background: #2a2a2a; }

    #instanceMenu button.danger {
      color: #ffb3b3;
      background: rgba(160, 32, 32, 0.16);
    }

    #instanceMenu button.danger:hover { background: rgba(190, 45, 45, 0.34); }

    body.noSelect, body.noSelect * {
      user-select: none !important;
    }
  </style>
</head>
<body>
  <div id="app">
    <aside id="sidePanel">
      <form id="newForm">
        <input id="newName" type="text" autocomplete="off" value="Instance" aria-label="Instance name" />
        <button type="submit">Create</button>
      </form>
      <select id="sortSelect" title="Sort instances">
        <option value="modified">Sort: recently modified</option>
        <option value="created">Sort: date created</option>
        <option value="name">Sort: name</option>
      </select>
      <div id="instanceList"></div>
      <label id="monospaceControl" title="Use Courier New for boxes in this instance">
        <input id="monospaceToggle" type="checkbox" />
        <span>Monospace</span>
      </label>
      <label id="autoBoldControl" title="When # is toggled on, bold the whole line; when # is toggled off, unbold the whole line">
        <input id="autoBoldToggle" type="checkbox" />
        <span># auto bold</span>
      </label>
      <label id="firstLineHashControl" title="Automatically make the first line of each box # sized in this instance">
        <input id="firstLineHashToggle" type="checkbox" />
        <span>First line #</span>
      </label>
    </aside>

    <main id="viewport">
      <div id="world">
        <svg id="lines">
          <defs>
            <marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
              <path d="M 0 0 L 10 5 L 0 10 z" fill="#e8e8e8"></path>
            </marker>
          </defs>
        </svg>
      </div>
      <div id="marquee"></div>
      <div id="formatToolbar" hidden aria-label="Text formatting">
        <button type="button" data-format="bold" title="Bold"><span>B</span></button>
        <button type="button" data-format="italic" title="Italic"><span>I</span></button>
        <button type="button" data-format="underline" title="Underline"><span>U</span></button>
        <button type="button" data-format="strike" title="Strikethrough"><span>S</span></button>
      </div>
      <button id="lineButton" type="button" hidden title="Make current line bigger"><span>#</span></button>
      <div id="controlHitLayer" hidden aria-hidden="true"></div>
      <div id="measureBox"></div>
    </main>
  </div>

  <div id="instanceMenu" hidden>
    <button id="renameInstanceButton" type="button">Rename</button>
    <button id="duplicateInstanceButton" type="button">Duplicate</button>
    <button id="deleteInstanceButton" class="danger" type="button">Delete</button>
  </div>

  <script>
    (() => {
      const STORAGE_KEY = "bare-bones-box-map-v1";
      const BASE_NAME = "Instance";
      const TEXT_SIZE = 16;
      const GRID_WORLD_SIZE = TEXT_SIZE * 1.5;
      const MIN_ZOOM = 0.1;
      const MAX_ZOOM = 6;
      const DRAG_THRESHOLD = 4;

      const viewport = document.getElementById("viewport");
      const world = document.getElementById("world");
      const svg = document.getElementById("lines");
      const marquee = document.getElementById("marquee");
      const measureBox = document.getElementById("measureBox");
      const formatToolbar = document.getElementById("formatToolbar");
      const lineButton = document.getElementById("lineButton");
      const controlHitLayer = document.getElementById("controlHitLayer");
      const CONTROL_VISUAL_SIZE = 36;
      const CONTROL_HIT_MARGIN = 12;
      const instanceList = document.getElementById("instanceList");
      const newForm = document.getElementById("newForm");
      const newName = document.getElementById("newName");
      const sortSelect = document.getElementById("sortSelect");
      const monospaceToggle = document.getElementById("monospaceToggle");
      const autoBoldToggle = document.getElementById("autoBoldToggle");
      const firstLineHashToggle = document.getElementById("firstLineHashToggle");
      const instanceMenu = document.getElementById("instanceMenu");
      const renameInstanceButton = document.getElementById("renameInstanceButton");
      const duplicateInstanceButton = document.getElementById("duplicateInstanceButton");
      const deleteInstanceButton = document.getElementById("deleteInstanceButton");

      let store = loadStore();
      let panX = 0;
      let panY = 0;
      let zoom = 1;
      let selectedIds = new Set();
      let selectedLinkId = null;
      let linkArmed = false;
      let saveTimer = null;
      let dragState = null;
      let panState = null;
      let selectState = null;
      let instanceMenuTargetId = null;
      let instanceClickTimer = null;
      let lastInstanceClick = null;
      let activeFormatBoxId = null;
      let activeLineEl = null;
      let controlHitRecords = [];
      let controlDownRecord = null;
      let suppressNextBoxBlurSave = false;
      let nppPointerHistory = null;
      let nppCaretDragState = null;
      let nppRunDragState = null;
      let nppLineDragState = null;
      let nppSuppressDblClickUntil = 0;
      const boxUndoStacks = new Map();
      const BOX_UNDO_LIMIT = 120;
      let restoringBoxUndo = false;

      function nppClickStage(event, fallbackSecondClick = false) {
        // Browser click counts keep increasing for very fast repeated clicks.
        // Notepad++/Scintilla-style selection should not treat the 4th click
        // as another triple click. Cycle as: 1=caret, 2=run, 3=line,
        // 4=caret again, 5=run, 6=line, ...
        const detail = Math.max(1, Number(event.detail) || (fallbackSecondClick ? 2 : 1));
        return ((detail - 1) % 3) + 1;
      }

      document.execCommand?.("styleWithCSS", false, false);
      document.execCommand?.("defaultParagraphSeparator", false, "div");

      const resizeObserver = new ResizeObserver(() => {
        renderLines();
        positionEditingControls();
      });

      function makeId(prefix) {
        return `${prefix}_${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 8)}`;
      }

      function now() { return Date.now(); }

      function blankInstance(name, options = {}) {
        const t = now();
        return {
          id: makeId("instance"),
          name,
          createdAt: t,
          modifiedAt: t,
          monospace: Boolean(options.monospace),
          hashAutoBold: Boolean(options.hashAutoBold),
          firstLineHash: Boolean(options.firstLineHash),
          view: { panX: 0, panY: 0, zoom: 1 },
          boxes: [],
          links: []
        };
      }

      function loadStore() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (raw) {
            const parsed = JSON.parse(raw);
            if (Array.isArray(parsed.instances) && parsed.instances.length) {
              for (const instance of parsed.instances) migrateInstance(instance);
              parsed.sort ||= "modified";
              return parsed;
            }
          }
        } catch (error) {
          console.warn("Could not read saved data.", error);
        }
        const first = blankInstance(BASE_NAME, { monospace: false });
        return { currentId: first.id, instances: [first], sort: "modified" };
      }

      function migrateInstance(instance) {
        instance.boxes ||= [];
        instance.links ||= [];
        instance.view ||= { panX: 0, panY: 0, zoom: 1 };
        instance.monospace = Boolean(instance.monospace);
        instance.hashAutoBold = Boolean(instance.hashAutoBold);
        instance.firstLineHash = Boolean(instance.firstLineHash);
        for (const box of instance.boxes) migrateBox(box);
      }

      function migrateBox(box) {
        box.text ||= "";
        if (!box.html) {
          const escaped = textToLineHtml(box.text || "");
          const wrappers = [];
          if (box.bold) wrappers.push("b");
          if (box.italic) wrappers.push("i");
          if (box.underline) wrappers.push("u");
          if (box.strike) wrappers.push("s");
          box.html = wrapAllLineText(escaped, wrappers);
        }
        box.w ||= 24;
        box.h ||= 24;
      }

      function escapeHtml(text) {
        return String(text)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      function textToLineHtml(text) {
        const lines = String(text ?? "").split("\n");
        return lines.map(line => `<div class="textLine">${line ? escapeHtml(line) : "<br>"}</div>`).join("");
      }

      function wrapAllLineText(html, wrappers) {
        if (!wrappers.length) return html;
        const temp = document.createElement("div");
        temp.innerHTML = html;
        for (const line of temp.querySelectorAll(".textLine")) {
          const content = line.innerHTML;
          if (content === "<br>" || content === "") continue;
          let wrapped = content;
          for (const tag of wrappers) wrapped = `<${tag}>${wrapped}</${tag}>`;
          line.innerHTML = wrapped;
        }
        return temp.innerHTML;
      }

      function currentInstance() {
        let found = store.instances.find(instance => instance.id === store.currentId);
        if (!found) {
          found = store.instances[0] || blankInstance(BASE_NAME, { monospace: false });
          if (!store.instances.length) store.instances.push(found);
          store.currentId = found.id;
        }
        migrateInstance(found);
        return found;
      }

      function saveNow(touchCurrent = false) {
        if (touchCurrent) currentInstance().modifiedAt = now();
        localStorage.setItem(STORAGE_KEY, JSON.stringify(store));
      }

      function scheduleSave(touchCurrent = true, rerenderList = true) {
        if (touchCurrent) currentInstance().modifiedAt = now();
        clearTimeout(saveTimer);
        saveTimer = setTimeout(() => saveNow(false), 120);
        if (rerenderList) renderInstanceList();
      }

      function uniqueName(base, ignoreId = null) {
        const cleanBase = (base || BASE_NAME).trim() || BASE_NAME;
        const names = new Set(store.instances.filter(instance => instance.id !== ignoreId).map(instance => instance.name));
        if (!names.has(cleanBase)) return cleanBase;
        let index = 2;
        while (names.has(`${cleanBase} ${index}`)) index += 1;
        return `${cleanBase} ${index}`;
      }

      function sortedInstances() {
        const sort = store.sort || "modified";
        const list = [...store.instances];
        if (sort === "name") list.sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: "base" }));
        else if (sort === "created") list.sort((a, b) => b.createdAt - a.createdAt);
        else list.sort((a, b) => b.modifiedAt - a.modifiedAt);
        return list;
      }

      function formatDate(ms) {
        return new Date(ms).toLocaleString(undefined, { month: "short", day: "numeric", hour: "numeric", minute: "2-digit" });
      }

      function renderInstanceList() {
        sortSelect.value = store.sort || "modified";
        instanceList.innerHTML = "";
        for (const instance of sortedInstances()) {
          const item = document.createElement("div");
          item.className = "instanceItem" + (instance.id === store.currentId ? " active" : "");
          item.dataset.id = instance.id;
          item.tabIndex = 0;

          const nameRow = document.createElement("div");
          nameRow.className = "instanceNameRow";
          const name = document.createElement("span");
          name.className = "instanceName";
          name.textContent = instance.name;
          nameRow.appendChild(name);

          const meta = document.createElement("div");
          meta.className = "instanceMeta";
          const created = document.createElement("div");
          created.className = "instanceCreated";
          created.textContent = `Created: ${formatDate(instance.createdAt)}`;
          const modified = document.createElement("div");
          modified.className = "instanceModified";
          modified.textContent = `Modified: ${formatDate(instance.modifiedAt)}`;
          meta.append(created, modified);
          item.append(nameRow, meta);

          item.addEventListener("pointerdown", event => {
            if (event.button !== 0 || item.classList.contains("renaming")) return;
            const t = performance.now();
            const previous = lastInstanceClick;
            const isDouble = previous && previous.id === instance.id && t - previous.time < 450 && Math.hypot(event.clientX - previous.x, event.clientY - previous.y) < 8;
            if (isDouble || event.detail >= 2) {
              event.preventDefault();
              event.stopPropagation();
              clearTimeout(instanceClickTimer);
              instanceClickTimer = null;
              lastInstanceClick = null;
              hideInstanceMenu();
              beginRenameById(instance.id);
              return;
            }
            lastInstanceClick = { id: instance.id, time: t, x: event.clientX, y: event.clientY };
          });

          item.addEventListener("click", event => {
            if (item.classList.contains("renaming")) return;
            if (event.detail >= 2) {
              event.preventDefault();
              return;
            }
            hideInstanceMenu();
            clearTimeout(instanceClickTimer);
            instanceClickTimer = setTimeout(() => {
              instanceClickTimer = null;
              if (store.currentId === instance.id) return;
              store.currentId = instance.id;
              clearSelection();
              hideEditingControls();
              saveNow(false);
              loadCurrentView();
              renderAll();
            }, 240);
          });

          item.addEventListener("dblclick", event => {
            event.preventDefault();
            event.stopPropagation();
            clearTimeout(instanceClickTimer);
            instanceClickTimer = null;
            lastInstanceClick = null;
            hideInstanceMenu();
            beginRenameById(instance.id);
          });

          item.addEventListener("contextmenu", event => {
            event.preventDefault();
            event.stopPropagation();
            showInstanceMenu(event, instance);
          });

          instanceList.appendChild(item);
        }
      }

      function beginRenameById(instanceId) {
        const instance = store.instances.find(item => item.id === instanceId);
        if (!instance) return;
        const item = Array.from(instanceList.children).find(child => child.dataset.id === instanceId);
        if (!item) {
          renderInstanceList();
          requestAnimationFrame(() => beginRenameById(instanceId));
          return;
        }
        beginRename(item, instance);
      }

      function measureTextWidthLike(text, referenceEl) {
        const measurer = document.createElement("span");
        measurer.textContent = text || " ";
        measurer.style.position = "fixed";
        measurer.style.left = "-9999px";
        measurer.style.top = "-9999px";
        measurer.style.visibility = "hidden";
        measurer.style.whiteSpace = "pre";
        const style = getComputedStyle(referenceEl);
        measurer.style.font = style.font;
        measurer.style.fontWeight = style.fontWeight;
        document.body.appendChild(measurer);
        const width = Math.ceil(measurer.getBoundingClientRect().width);
        measurer.remove();
        return width;
      }

      function beginRename(item, instance) {
        if (item.classList.contains("renaming")) return;
        const nameEl = item.querySelector(".instanceName");
        const nameRow = item.querySelector(".instanceNameRow");
        if (!nameEl || !nameRow) return;

        item.classList.add("renaming");
        suppressNextBoxBlurSave = true;
        document.activeElement?.blur?.();
        requestAnimationFrame(() => { suppressNextBoxBlurSave = false; });

        const displayedNameWidth = Math.max(48, Math.ceil(nameEl.getBoundingClientRect().width), measureTextWidthLike(instance.name, nameEl) + 10);
        const rowWidth = Math.max(48, Math.floor(nameRow.getBoundingClientRect().width));
        const inputWidth = Math.min(displayedNameWidth, rowWidth);

        const input = document.createElement("input");
        input.className = "renameInput";
        input.value = instance.name;
        input.setAttribute("aria-label", "Rename instance");
        input.style.setProperty("--rename-width", `${inputWidth}px`);

        nameEl.replaceWith(input);
        input.focus();
        input.select();

        input.addEventListener("pointerdown", event => event.stopPropagation());
        input.addEventListener("click", event => event.stopPropagation());
        input.addEventListener("dblclick", event => event.stopPropagation());
        input.addEventListener("contextmenu", event => {
          event.preventDefault();
          event.stopPropagation();
        });

        let done = false;
        const finish = commit => {
          if (done) return;
          done = true;
          item.classList.remove("renaming");
          if (commit) {
            const nextName = uniqueName(input.value, instance.id);
            if (nextName !== instance.name) {
              const oldModifiedAt = instance.modifiedAt;
              instance.name = nextName;
              instance.modifiedAt = oldModifiedAt;
              saveNow(false);
            }
          }
          renderInstanceList();
        };

        input.addEventListener("keydown", event => {
          if (event.key === "Enter") {
            event.preventDefault();
            finish(true);
          }
          if (event.key === "Escape") {
            event.preventDefault();
            finish(false);
          }
        });
        input.addEventListener("blur", () => finish(true));
      }

      function showInstanceMenu(event, instance) {
        instanceMenuTargetId = instance.id;
        instanceMenu.hidden = false;
        const width = instanceMenu.offsetWidth || 135;
        const height = instanceMenu.offsetHeight || 110;
        const left = Math.min(event.clientX, window.innerWidth - width - 6);
        const top = Math.min(event.clientY, window.innerHeight - height - 6);
        instanceMenu.style.left = `${Math.max(6, left)}px`;
        instanceMenu.style.top = `${Math.max(6, top)}px`;
      }

      function hideInstanceMenu() {
        instanceMenu.hidden = true;
        instanceMenuTargetId = null;
      }

      function duplicateInstance(source) {
        if (!source) return;
        const t = now();
        const idMap = new Map();
        const clone = {
          id: makeId("instance"),
          name: uniqueName(source.name),
          createdAt: t,
          modifiedAt: t,
          monospace: Boolean(source.monospace),
          hashAutoBold: Boolean(source.hashAutoBold),
          firstLineHash: Boolean(source.firstLineHash),
          view: { ...(source.view || { panX: 0, panY: 0, zoom: 1 }) },
          boxes: [],
          links: []
        };
        clone.boxes = (source.boxes || []).map(box => {
          const newId = makeId("box");
          idMap.set(box.id, newId);
          return { ...box, id: newId };
        });
        clone.links = (source.links || []).map(link => ({ ...link, id: makeId("link"), from: idMap.get(link.from), to: idMap.get(link.to) })).filter(link => link.from && link.to && link.from !== link.to);
        store.instances.push(clone);
        store.currentId = clone.id;
        clearSelection();
        hideEditingControls();
        saveNow(false);
        loadCurrentView();
        renderAll();
      }

      function deleteInstance(instance) {
        if (!instance) return;
        const ok = window.confirm(`Are you sure you want to delete "${instance.name}"?`);
        if (!ok) return;
        const index = store.instances.findIndex(item => item.id === instance.id);
        if (index === -1) return;
        const deletingCurrent = store.currentId === instance.id;
        store.instances.splice(index, 1);
        if (!store.instances.length) store.instances.push(blankInstance(BASE_NAME, { monospace: false }));
        if (deletingCurrent) {
          const next = store.instances[Math.min(index, store.instances.length - 1)] || store.instances[0];
          store.currentId = next.id;
          clearSelection();
          hideEditingControls();
          loadCurrentView();
        }
        saveNow(false);
        renderAll();
      }

      function loadCurrentView() {
        const view = currentInstance().view || { panX: 0, panY: 0, zoom: 1 };
        panX = Number.isFinite(view.panX) ? view.panX : 0;
        panY = Number.isFinite(view.panY) ? view.panY : 0;
        zoom = Number.isFinite(view.zoom) ? view.zoom : 1;
        zoom = clamp(zoom, MIN_ZOOM, MAX_ZOOM);
        applyView();
      }

      function saveCurrentView(touch = false) {
        currentInstance().view = { panX, panY, zoom };
        scheduleSave(touch, false);
      }

      function clamp(value, min, max) { return Math.max(min, Math.min(max, value)); }

      function applyView() {
        world.style.transform = `matrix(${zoom}, 0, 0, ${zoom}, ${panX}, ${panY})`;
        const gridSize = GRID_WORLD_SIZE * zoom;
        viewport.style.setProperty("--grid-size", `${gridSize}px`);
        viewport.style.setProperty("--grid-x", `${mod(panX, gridSize)}px`);
        viewport.style.setProperty("--grid-y", `${mod(panY, gridSize)}px`);
        positionEditingControls();
      }

      function mod(value, size) {
        if (!size) return 0;
        return ((value % size) + size) % size;
      }

      function screenToWorld(clientX, clientY) {
        const rect = viewport.getBoundingClientRect();
        return { x: (clientX - rect.left - panX) / zoom, y: (clientY - rect.top - panY) / zoom };
      }

      function screenToViewport(clientX, clientY) {
        const rect = viewport.getBoundingClientRect();
        return { x: clientX - rect.left, y: clientY - rect.top };
      }

      function pointInsideAnyBox(clientX, clientY, extra = 0) {
        // First check the rendered DOM rectangles. This covers the visible box,
        // including padding, text lines, and any browser layout quirks.
        for (const box of world.querySelectorAll(".box")) {
          const rect = box.getBoundingClientRect();
          if (
            clientX >= rect.left - extra &&
            clientX <= rect.right + extra &&
            clientY >= rect.top - extra &&
            clientY <= rect.bottom + extra
          ) return true;
        }

        // Then check the saved world-space rectangles. This is intentionally
        // independent from event.target so the first editable line, empty lines,
        // and padding cannot be mistaken for the background during dblclick.
        const point = screenToWorld(clientX, clientY);
        const worldExtra = extra / Math.max(zoom, 0.0001);
        for (const data of currentInstance().boxes || []) {
          const w = Number.isFinite(data.w) ? data.w : 24;
          const h = Number.isFinite(data.h) ? data.h : 24;
          if (
            point.x >= data.x - worldExtra &&
            point.x <= data.x + w + worldExtra &&
            point.y >= data.y - worldExtra &&
            point.y <= data.y + h + worldExtra
          ) return true;
        }
        return false;
      }

      function isEditingControlTarget(target) {
        return Boolean(target && (
          target.closest?.("#formatToolbar button[data-format]") ||
          target.closest?.("#lineButton") ||
          formatToolbar.contains(target) ||
          lineButton.contains(target)
        ));
      }

      function clearBrowserTextSelection() {
        const selection = window.getSelection?.();
        if (selection && !selection.isCollapsed) selection.removeAllRanges();
      }


      let lastPointerDownInsideBox = { time: 0, x: 0, y: 0 };
      document.addEventListener("pointerdown", event => {
        if (event.button !== 0) return;
        if (pointInsideAnyBox(event.clientX, event.clientY, 10)) {
          lastPointerDownInsideBox = { time: performance.now(), x: event.clientX, y: event.clientY };
        }
      }, true);

      function setViewKeepingWorldAtClient(worldPoint, clientX, clientY) {
        const point = screenToViewport(clientX, clientY);
        panX = point.x - worldPoint.x * zoom;
        panY = point.y - worldPoint.y * zoom;
      }

      function syncInstanceControls() {
        const mono = Boolean(currentInstance().monospace);
        world.classList.toggle("monospaceText", mono);
        measureBox.classList.toggle("monospaceMeasure", mono);
        monospaceToggle.checked = mono;
        autoBoldToggle.checked = Boolean(currentInstance().hashAutoBold);
        firstLineHashToggle.checked = Boolean(currentInstance().firstLineHash);
      }

      function renderAll() {
        syncInstanceControls();
        renderBoxes();
        renderLines();
        renderInstanceList();
        syncInstanceControls();
        positionEditingControls();
      }

      function clearSelection() {
        selectedIds.clear();
        selectedLinkId = null;
        linkArmed = false;
      }

      function clearBoxSelection() {
        selectedIds.clear();
        linkArmed = false;
      }

      function selectLink(linkId) {
        clearBoxSelection();
        selectedLinkId = linkId;
        syncSelectionClasses();
        renderLines();
      }

      function setSelection(ids, shouldArm = false) {
        selectedLinkId = null;
        selectedIds = new Set(ids);
        linkArmed = shouldArm && selectedIds.size > 0;
        syncSelectionClasses();
      }

      function syncSelectionClasses() {
        for (const box of world.querySelectorAll(".box")) {
          const id = box.dataset.id;
          const selected = selectedIds.has(id);
          box.classList.toggle("selected", selected);
          box.classList.toggle("linkArmed", selected && linkArmed);
        }
      }

      function normalizeBoxLines(box) {
        if (!box.innerHTML.trim()) {
          box.innerHTML = '<div class="textLine"><br></div>';
          return;
        }
        const direct = Array.from(box.childNodes);
        let changed = false;
        if (!direct.length) {
          box.innerHTML = '<div class="textLine"><br></div>';
          return;
        }
        for (const node of direct) {
          if (node.nodeType === Node.ELEMENT_NODE && node.matches("div")) {
            node.classList.add("textLine");
            if (!node.innerHTML) node.innerHTML = "<br>";
          } else if (node.nodeType === Node.ELEMENT_NODE && node.matches(".textLine")) {
            if (!node.innerHTML) node.innerHTML = "<br>";
          } else {
            changed = true;
          }
        }
        if (changed) {
          const fragLines = [];
          let current = document.createElement("div");
          current.className = "textLine";
          for (const node of Array.from(box.childNodes)) {
            if (node.nodeType === Node.ELEMENT_NODE && node.tagName === "BR") {
              if (!current.innerHTML) current.innerHTML = "<br>";
              fragLines.push(current);
              current = document.createElement("div");
              current.className = "textLine";
            } else if (node.nodeType === Node.ELEMENT_NODE && node.matches("div")) {
              fragLines.push(node);
            } else {
              current.appendChild(node);
            }
          }
          if (current.childNodes.length || !fragLines.length) {
            if (!current.innerHTML) current.innerHTML = "<br>";
            fragLines.push(current);
          }
          box.innerHTML = "";
          for (const line of fragLines) {
            line.classList.add("textLine");
            box.appendChild(line);
          }
        }
      }


      function ensureLineNotEmpty(line) {
        if (!line) return;
        if (!line.childNodes.length || (!line.textContent && !line.querySelector("br"))) {
          line.innerHTML = "<br>";
        }
      }

      function closestTextLine(node, box) {
        if (!node || !box) return null;
        const element = node.nodeType === Node.ELEMENT_NODE ? node : node.parentElement;
        if (!element) return null;
        const line = element.closest?.(".textLine");
        return line && box.contains(line) ? line : null;
      }

      function placeCaretAtStart(element) {
        if (!element) return;
        element.focus();
        const range = document.createRange();
        range.setStart(element, 0);
        range.collapse(true);
        const selection = document.getSelection();
        selection.removeAllRanges();
        selection.addRange(range);
      }

      function placeCaretAfterCarriedIndent(line, indentText) {
        if (!line) return;
        line.focus?.();
        const range = document.createRange();
        if (indentText && line.firstChild && line.firstChild.nodeType === Node.TEXT_NODE) {
          range.setStart(line.firstChild, Math.min(indentText.length, line.firstChild.data.length));
        } else {
          range.setStart(line, 0);
        }
        range.collapse(true);
        const selection = document.getSelection();
        selection.removeAllRanges();
        selection.addRange(range);
      }

      function nodePathFromBox(box, node) {
        if (!box || !node) return null;
        const path = [];
        let current = node;
        while (current && current !== box) {
          const parent = current.parentNode;
          if (!parent) return null;
          const index = Array.prototype.indexOf.call(parent.childNodes, current);
          if (index < 0) return null;
          path.unshift(index);
          current = parent;
        }
        return current === box ? path : null;
      }

      function nodeFromBoxPath(box, path) {
        let current = box;
        for (const index of path || []) {
          if (!current || !current.childNodes || index < 0 || index >= current.childNodes.length) return null;
          current = current.childNodes[index];
        }
        return current;
      }

      function selectionSnapshotForBox(box) {
        const selection = document.getSelection();
        if (!selection || !selection.rangeCount) return null;
        const anchorNode = selection.anchorNode;
        const focusNode = selection.focusNode;
        if (!anchorNode || !focusNode || !box.contains(anchorNode) || !box.contains(focusNode)) return null;
        const anchorPath = nodePathFromBox(box, anchorNode);
        const focusPath = nodePathFromBox(box, focusNode);
        if (!anchorPath || !focusPath) return null;
        return {
          anchorPath,
          anchorOffset: selection.anchorOffset,
          focusPath,
          focusOffset: selection.focusOffset
        };
      }

      function compareDomPoints(aNode, aOffset, bNode, bOffset) {
        try {
          const range = document.createRange();
          range.setStart(aNode, aOffset);
          range.setEnd(bNode, bOffset);
          return range.collapsed ? 1 : -1;
        } catch (e) {
          return 0;
        }
      }

      function restoreSelectionSnapshotForBox(box, snapshot) {
        if (!snapshot) {
          placeCaretAtEnd(box);
          return;
        }
        const anchorNode = nodeFromBoxPath(box, snapshot.anchorPath);
        const focusNode = nodeFromBoxPath(box, snapshot.focusPath);
        if (!anchorNode || !focusNode) {
          placeCaretAtEnd(box);
          return;
        }

        const anchorOffset = Math.min(snapshot.anchorOffset, anchorNode.nodeType === Node.TEXT_NODE ? anchorNode.nodeValue.length : anchorNode.childNodes.length);
        const focusOffset = Math.min(snapshot.focusOffset, focusNode.nodeType === Node.TEXT_NODE ? focusNode.nodeValue.length : focusNode.childNodes.length);
        const selection = document.getSelection();
        selection.removeAllRanges();

        try {
          const range = document.createRange();
          if (compareDomPoints(anchorNode, anchorOffset, focusNode, focusOffset) <= 0) {
            range.setStart(anchorNode, anchorOffset);
            range.setEnd(focusNode, focusOffset);
          } else {
            range.setStart(focusNode, focusOffset);
            range.setEnd(anchorNode, anchorOffset);
          }
          selection.addRange(range);
        } catch (e) {
          placeCaretAtEnd(box);
        }
      }

      function pushBoxUndoSnapshot(box) {
        if (restoringBoxUndo || !box?.dataset?.id) return;
        const id = box.dataset.id;
        const snapshot = {
          html: box.innerHTML,
          selection: selectionSnapshotForBox(box)
        };
        const stack = boxUndoStacks.get(id) || [];
        const last = stack[stack.length - 1];
        if (last && last.html === snapshot.html) return;
        stack.push(snapshot);
        while (stack.length > BOX_UNDO_LIMIT) stack.shift();
        boxUndoStacks.set(id, stack);
      }

      function undoLastBoxEdit(box, data) {
        if (!box?.dataset?.id || !data) return false;
        const stack = boxUndoStacks.get(box.dataset.id);
        if (!stack || !stack.length) return false;
        const snapshot = stack.pop();
        restoringBoxUndo = true;
        try {
          box.innerHTML = snapshot.html || '<div class="textLine"><br></div>';
          normalizeBoxLines(box);
          data.html = box.innerHTML;
          data.text = box.innerText.replace(/\n$/, "");
          autoSizeBox(box, data);
          requestAnimationFrame(() => {
            renderLines();
            positionEditingControls();
            updateToolbarState();
          });
          scheduleSave(true, true);
          box.focus({ preventScroll: true });
          restoreSelectionSnapshotForBox(box, snapshot.selection);
        } finally {
          restoringBoxUndo = false;
        }
        return true;
      }

      function leadingIndentForLine(line) {
        if (!line) return "";
        const raw = line.textContent || "";
        const match = raw.match(/^[\t \u00a0]*/);
        return (match ? match[0] : "").replaceAll("\u00a0", " ");
      }

      function lineFromSelectionRange(box, range) {
        let line = closestTextLine(range.startContainer, box);
        if (line) return line;
        if (range.startContainer === box) {
          const at = range.startOffset;
          const direct = box.childNodes[at] || box.childNodes[at - 1] || null;
          if (direct) {
            if (direct.nodeType === Node.ELEMENT_NODE && direct.matches?.(".textLine")) return direct;
            line = closestTextLine(direct, box);
            if (line) return line;
          }
        }
        return null;
      }

      function placeCaretAtLineOffset(line, offset) {
        if (!line) return;
        const pos = domPositionFromLineOffset(line, offset);
        const range = document.createRange();
        range.setStart(pos.node, pos.offset);
        range.collapse(true);
        const selection = document.getSelection();
        selection.removeAllRanges();
        selection.addRange(range);
      }

      function removePlaceholderBreak(line) {
        if (!line) return;
        if (!line.textContent && line.childNodes.length === 1 && line.firstChild?.nodeType === Node.ELEMENT_NODE && line.firstChild.tagName === "BR") {
          line.innerHTML = "";
        }
      }

      function handleBackspaceAtLineStart(box, data, event) {
        const selection = document.getSelection();
        if (!selection || !selection.rangeCount || !selection.isCollapsed) return false;
        const range = selection.getRangeAt(0);
        if (!box.contains(range.commonAncestorContainer)) return false;

        const line = lineFromSelectionRange(box, range);
        if (!line) return false;

        const offsetInLine = lineOffsetFromDomPosition(line, range.startContainer, range.startOffset);
        if (offsetInLine !== 0) return false;

        const previousLine = line.previousElementSibling?.matches?.(".textLine") ? line.previousElementSibling : null;
        if (!previousLine) return false;

        event.preventDefault();
        event.stopPropagation();

        const previousEndOffset = (previousLine.textContent || "").length;
        removePlaceholderBreak(previousLine);

        // Move the current line's contents up, then remove the current line.
        // If the current line is empty, this simply deletes the blank line.
        const children = Array.from(line.childNodes);
        const currentHasOnlyPlaceholder = !line.textContent && children.length === 1 && children[0].nodeType === Node.ELEMENT_NODE && children[0].tagName === "BR";
        if (!currentHasOnlyPlaceholder) {
          for (const child of children) previousLine.appendChild(child);
        }
        line.remove();
        ensureLineNotEmpty(previousLine);
        box.focus({ preventScroll: true });
        placeCaretAtLineOffset(previousLine, previousEndOffset);
        activeLineEl = previousLine;
        afterBoxEdited(box, data, true);
        updateLineButtonState();
        positionEditingControls();
        return true;
      }

      function insertUnhashedLineBreak(box, data) {
        const selection = document.getSelection();
        if (!selection || !selection.rangeCount) return false;
        let range = selection.getRangeAt(0);
        if (!box.contains(range.commonAncestorContainer)) return false;

        if (!range.collapsed) {
          range.deleteContents();
          range = selection.getRangeAt(0);
        }

        let line = closestTextLine(range.startContainer, box);
        if (!line) {
          normalizeBoxLines(box);
          line = closestTextLine(selection.anchorNode, box) || box.querySelector(".textLine");
        }
        if (!line) return false;

        const afterRange = document.createRange();
        try {
          afterRange.setStart(range.startContainer, range.startOffset);
          afterRange.setEnd(line, line.childNodes.length);
        } catch (e) {
          return false;
        }

        const shouldCarryIndent = Boolean(currentInstance().monospace);
        const carriedIndent = shouldCarryIndent ? leadingIndentForLine(line) : "";
        const afterFragment = afterRange.extractContents();
        const newLine = document.createElement("div");
        newLine.className = "textLine";
        newLine.classList.remove("bigLine");

        if (carriedIndent) {
          newLine.appendChild(document.createTextNode(carriedIndent));
        }
        if (afterFragment.childNodes.length) {
          newLine.appendChild(afterFragment);
        }
        ensureLineNotEmpty(line);
        ensureLineNotEmpty(newLine);
        line.after(newLine);
        // Keep the auto-indented spaces/tabs, but put the caret AFTER them.
        // The previous version inserted the indent and then placed the caret at
        // the start of the line, so typing appeared to happen before the indent.
        placeCaretAfterCarriedIndent(newLine, carriedIndent);
        activeLineEl = newLine;
        afterBoxEdited(box, data, true);
        updateLineButtonState();
        positionEditingControls();
        return true;
      }

      function renderBoxes() {
        resizeObserver.disconnect();
        world.querySelectorAll(".box").forEach(box => box.remove());
        for (const data of currentInstance().boxes) {
          migrateBox(data);
          const box = document.createElement("div");
          box.className = "box";
          box.dataset.id = data.id;
          box.contentEditable = "true";
          box.spellcheck = false;
          box.innerHTML = data.html || textToLineHtml(data.text || "");
          normalizeBoxLines(box);
          placeBox(box, data.x, data.y);
          autoSizeBox(box, data);

          box.addEventListener("focus", () => {
            selectedLinkId = null;
            activeFormatBoxId = data.id;
            updateToolbarState();
            showEditingControls(data.id);
            renderLines();
          });

          box.addEventListener("contextmenu", event => {
            event.preventDefault();
            event.stopPropagation();
          });

          box.addEventListener("dblclick", event => {
            event.preventDefault();
            event.stopPropagation();
          });

          box.addEventListener("pointerdown", event => onBoxPointerDown(event, data, box));

          box.addEventListener("mouseup", () => {
            activeFormatBoxId = data.id;
            updateToolbarState();
            updateActiveLineFromSelection();
            positionEditingControls();
          });

          box.addEventListener("mousemove", event => {
            if (activeFormatBoxId !== data.id || document.activeElement !== box) return;
            const line = lineFromExtendedPoint(event.clientX, event.clientY, box);
            if (line) {
              activeLineEl = line;
              positionLineButton();
              updateLineButtonState();
            }
          });

          box.addEventListener("keydown", event => {
            const lowerKey = event.key.toLowerCase();

            if ((event.ctrlKey || event.metaKey) && !event.shiftKey && lowerKey === "z") {
              if (undoLastBoxEdit(box, data)) {
                event.preventDefault();
                event.stopPropagation();
                return;
              }
              return;
            }

            if (event.key === "Backspace") {
              pushBoxUndoSnapshot(box);
              if (handleBackspaceAtLineStart(box, data, event)) {
                return;
              }
              return;
            }
            if (event.key === "Enter") {
              pushBoxUndoSnapshot(box);
              event.preventDefault();
              event.stopPropagation();
              insertUnhashedLineBreak(box, data);
              return;
            }
            if (event.key === "Tab") {
              pushBoxUndoSnapshot(box);
              event.preventDefault();
              event.stopPropagation();
              document.execCommand("insertText", false, "\t");
              afterBoxEdited(box, data, true);
              return;
            }
            if ((event.ctrlKey || event.metaKey) && ["b", "i", "u"].includes(lowerKey)) {
              pushBoxUndoSnapshot(box);
              event.preventDefault();
              const key = lowerKey;
              if (key === "b") runFormatCommand("bold");
              if (key === "i") runFormatCommand("italic");
              if (key === "u") runFormatCommand("underline");
              return;
            }
          });

          box.addEventListener("beforeinput", event => {
            if (restoringBoxUndo) return;
            if (event.inputType === "historyUndo" || event.inputType === "historyRedo") return;
            if (event.inputType === "insertFromPaste") return;
            pushBoxUndoSnapshot(box);
          });

          box.addEventListener("keyup", () => {
            activeFormatBoxId = data.id;
            updateToolbarState();
            // Do not move the # button to the caret while typing.
            // It follows the hovered/clicked line instead.
            positionEditingControls();
          });

          box.addEventListener("paste", event => {
            event.preventDefault();
            pushBoxUndoSnapshot(box);
            const text = event.clipboardData?.getData("text/plain") || "";
            insertPlainTextWithLines(text);
            afterBoxEdited(box, data, true);
          });

          box.addEventListener("input", () => afterBoxEdited(box, data, true));

          box.addEventListener("blur", () => {
            setTimeout(() => {
              if (formatToolbar.contains(document.activeElement) || lineButton === document.activeElement) return;
              if (suppressNextBoxBlurSave) return;
              afterBoxEdited(box, data, true);
              if (activeFormatBoxId === data.id) hideEditingControls();
            }, 0);
          });

          world.appendChild(box);
          resizeObserver.observe(box);
        }
        syncSelectionClasses();
      }

      function afterBoxEdited(box, data, touchModified) {
        normalizeBoxLines(box);
        data.html = box.innerHTML;
        data.text = box.innerText.replace(/\n$/, "");
        autoSizeBox(box, data);
        requestAnimationFrame(() => {
          renderLines();
          positionEditingControls();
          updateToolbarState();
        });
        scheduleSave(touchModified, true);
      }

      function placeBox(element, x, y) {
        element.style.left = `${x}px`;
        element.style.top = `${y}px`;
      }

      function autoSizeBox(element, data = null) {
        measureBox.innerHTML = element.innerHTML || '<div class="textLine"><br></div>';
        const hasBigLine = Boolean(element.querySelector?.(".textLine.bigLine"));
        measureBox.style.maxWidth = hasBigLine ? "none" : "480px";
        const rect = measureBox.getBoundingClientRect();
        const measuredWidth = Math.max(rect.width, measureBox.scrollWidth);
        const maxWidth = hasBigLine ? 4000 : 480;
        const width = clamp(Math.ceil(measuredWidth + 2), 24, maxWidth);
        const height = Math.max(24, Math.ceil(rect.height + 2));
        element.style.width = `${width}px`;
        element.style.height = `${height}px`;
        if (data) {
          data.w = width;
          data.h = height;
        }
      }

      function onBoxPointerDown(event, data, box) {
        if (event.button === 0) {
          const hadSelectedLink = selectedLinkId !== null;
          selectedLinkId = null;
          activeFormatBoxId = data.id;
          if (hadSelectedLink) renderLines();
          updateToolbarState();
          showEditingControls(data.id);
        }

        if (event.button === 0 && linkArmed && selectedIds.size) {
          event.preventDefault();
          event.stopPropagation();
          document.activeElement?.blur?.();
          connectSelectionTo(data.id);
          clearSelection();
          syncSelectionClasses();
          renderLines();
          return;
        }

        if (event.button === 2) {
          event.preventDefault();
          event.stopPropagation();
          document.activeElement?.blur?.();

          const additive = event.ctrlKey || event.metaKey;
          if (additive) {
            if (selectedIds.has(data.id)) selectedIds.delete(data.id);
            else selectedIds.add(data.id);
          } else if (!selectedIds.has(data.id)) {
            selectedIds = new Set([data.id]);
          }
          selectedLinkId = null;
          linkArmed = selectedIds.size > 0;
          syncSelectionClasses();
          const idsToMove = selectedIds.has(data.id) ? [...selectedIds] : [data.id];
          beginBoxDrag(event, box, idsToMove);
        }
      }

      function beginBoxDrag(event, element, idsToMove) {
        const originals = new Map();
        for (const id of idsToMove) {
          const item = getBoxData(id);
          if (item) originals.set(id, { x: item.x, y: item.y });
        }
        dragState = {
          pointerId: event.pointerId,
          startX: event.clientX,
          startY: event.clientY,
          ids: [...originals.keys()],
          originals,
          element,
          moved: false
        };
        try { element.setPointerCapture(event.pointerId); } catch (e) {}
      }

      function connectSelectionTo(targetId) {
        const sources = [...selectedIds].filter(id => id !== targetId);
        for (const sourceId of sources) addLink(sourceId, targetId, false);
        if (sources.length) scheduleSave(true, true);
      }

      function addLink(from, to, save = true) {
        if (!from || !to || from === to) return;
        const inst = currentInstance();
        const exists = inst.links.some(link => link.from === from && link.to === to);
        if (!exists) {
          inst.links.push({ id: makeId("link"), from, to });
          if (save) scheduleSave(true, true);
        }
      }

      function deleteSelectedBoxes() {
        if (!selectedIds.size) return;
        const inst = currentInstance();
        inst.boxes = inst.boxes.filter(box => !selectedIds.has(box.id));
        inst.links = inst.links.filter(link => !selectedIds.has(link.from) && !selectedIds.has(link.to));
        clearSelection();
        hideEditingControls();
        scheduleSave(true, true);
        renderAll();
      }

      function deleteSelectedLink() {
        if (!selectedLinkId) return;
        const inst = currentInstance();
        const before = inst.links.length;
        inst.links = inst.links.filter(link => link.id !== selectedLinkId);
        selectedLinkId = null;
        if (inst.links.length !== before) scheduleSave(true, true);
        renderLines();
      }

      function getBoxData(id) { return currentInstance().boxes.find(box => box.id === id); }
      function getBoxElement(id) { return world.querySelector(`.box[data-id="${CSS.escape(id)}"]`); }

      function renderLines() {
        [...svg.querySelectorAll("line")].forEach(line => line.remove());
        const inst = currentInstance();
        const linkIds = new Set(inst.links.map(link => link.id));
        if (selectedLinkId && !linkIds.has(selectedLinkId)) selectedLinkId = null;

        for (const link of inst.links) {
          const from = getBoxRect(link.from);
          const to = getBoxRect(link.to);
          if (!from || !to) continue;
          const points = closestSidePoints(from, to);

          const visible = document.createElementNS("http://www.w3.org/2000/svg", "line");
          visible.classList.add("linkLine");
          if (link.id === selectedLinkId) visible.classList.add("selected");
          visible.setAttribute("x1", points.start.x);
          visible.setAttribute("y1", points.start.y);
          visible.setAttribute("x2", points.end.x);
          visible.setAttribute("y2", points.end.y);
          visible.setAttribute("stroke", "#e8e8e8");
          visible.setAttribute("stroke-width", link.id === selectedLinkId ? "4" : "2");
          visible.setAttribute("marker-end", "url(#arrowhead)");
          svg.appendChild(visible);

          const hit = document.createElementNS("http://www.w3.org/2000/svg", "line");
          hit.classList.add("linkHit");
          hit.setAttribute("x1", points.start.x);
          hit.setAttribute("y1", points.start.y);
          hit.setAttribute("x2", points.end.x);
          hit.setAttribute("y2", points.end.y);
          hit.setAttribute("stroke", "transparent");
          hit.setAttribute("stroke-width", "14");
          hit.setAttribute("fill", "none");
          hit.addEventListener("pointerdown", event => {
            if (event.button !== 0) {
              event.preventDefault();
              event.stopPropagation();
              return;
            }
            event.preventDefault();
            event.stopPropagation();
            document.activeElement?.blur?.();
            clearBrowserTextSelection();
          });
          hit.addEventListener("click", event => {
            event.preventDefault();
            event.stopPropagation();
            document.activeElement?.blur?.();
            clearBrowserTextSelection();
            hideEditingControls();
            selectLink(link.id);
          });
          hit.addEventListener("dblclick", event => {
            if (event.button !== 0) return;
            event.preventDefault();
            event.stopPropagation();
            event.stopImmediatePropagation?.();
            document.activeElement?.blur?.();
            clearBrowserTextSelection();
            hideEditingControls();
            selectedLinkId = link.id;
            deleteSelectedLink();
          });
          hit.addEventListener("contextmenu", event => {
            event.preventDefault();
            event.stopPropagation();
          });
          svg.appendChild(hit);
        }
      }

      function getBoxRect(id) {
        const data = getBoxData(id);
        const element = getBoxElement(id);
        if (!data || !element) return null;
        autoSizeBox(element, data);
        return { x: data.x, y: data.y, w: data.w || element.offsetWidth, h: data.h || element.offsetHeight };
      }

      function sideCenters(rect) {
        return [
          { side: "top", x: rect.x + rect.w / 2, y: rect.y },
          { side: "right", x: rect.x + rect.w, y: rect.y + rect.h / 2 },
          { side: "bottom", x: rect.x + rect.w / 2, y: rect.y + rect.h },
          { side: "left", x: rect.x, y: rect.y + rect.h / 2 }
        ];
      }

      function closestSidePoints(fromRect, toRect) {
        const fromSides = sideCenters(fromRect);
        const toSides = sideCenters(toRect);
        let best = { start: fromSides[0], end: toSides[0], distance: Infinity };
        for (const start of fromSides) {
          for (const end of toSides) {
            const dx = end.x - start.x;
            const dy = end.y - start.y;
            const distance = dx * dx + dy * dy;
            if (distance < best.distance) best = { start, end, distance };
          }
        }
        return best;
      }

      function createBoxAt(clientX, clientY) {
        const point = screenToWorld(clientX, clientY);
        const inst = currentInstance();
        const firstLineClasses = inst.firstLineHash ? "textLine bigLine" : "textLine";
        const firstLineContent = inst.firstLineHash && inst.hashAutoBold ? "<b><br></b>" : "<br>";
        const box = {
          id: makeId("box"),
          x: Math.round(point.x),
          y: Math.round(point.y),
          text: "",
          html: `<div class="${firstLineClasses}">${firstLineContent}</div>`,
          w: 24,
          h: 24
        };
        inst.boxes.push(box);
        selectedIds.clear();
        selectedLinkId = null;
        linkArmed = false;
        scheduleSave(true, true);
        renderAll();
        requestAnimationFrame(() => {
          const element = getBoxElement(box.id);
          if (element) {
            element.focus();
            placeCaretAtEnd(element);
          }
        });
      }

      function getWorldRectFromViewportRect(rect) {
        const a = screenToWorld(rect.left, rect.top);
        const b = screenToWorld(rect.right, rect.bottom);
        return { left: Math.min(a.x, b.x), right: Math.max(a.x, b.x), top: Math.min(a.y, b.y), bottom: Math.max(a.y, b.y) };
      }

      function getSelectedInWorldRect(worldRect) {
        const ids = [];
        for (const box of currentInstance().boxes) {
          const element = getBoxElement(box.id);
          if (!element) continue;
          autoSizeBox(element, box);
          const boxRect = { left: box.x, right: box.x + (box.w || element.offsetWidth), top: box.y, bottom: box.y + (box.h || element.offsetHeight) };
          if (rectsOverlap(worldRect, boxRect)) ids.push(box.id);
        }
        return ids;
      }

      function rectsOverlap(a, b) { return a.left <= b.right && a.right >= b.left && a.top <= b.bottom && a.bottom >= b.top; }

      function updateMarqueeVisual() {
        if (!selectState) return;
        const left = Math.min(selectState.startViewport.x, selectState.currentViewport.x);
        const top = Math.min(selectState.startViewport.y, selectState.currentViewport.y);
        const width = Math.abs(selectState.currentViewport.x - selectState.startViewport.x);
        const height = Math.abs(selectState.currentViewport.y - selectState.startViewport.y);
        marquee.style.left = `${left}px`;
        marquee.style.top = `${top}px`;
        marquee.style.width = `${width}px`;
        marquee.style.height = `${height}px`;
        marquee.style.display = "block";
      }

      function updateSelectionFromMarquee() {
        if (!selectState) return;
        const vpRect = viewport.getBoundingClientRect();
        const left = Math.min(selectState.startViewport.x, selectState.currentViewport.x) + vpRect.left;
        const top = Math.min(selectState.startViewport.y, selectState.currentViewport.y) + vpRect.top;
        const right = Math.max(selectState.startViewport.x, selectState.currentViewport.x) + vpRect.left;
        const bottom = Math.max(selectState.startViewport.y, selectState.currentViewport.y) + vpRect.top;
        const hits = getSelectedInWorldRect(getWorldRectFromViewportRect({ left, top, right, bottom }));
        const next = new Set(selectState.baseIds);
        if (!selectState.additive) next.clear();
        for (const id of hits) next.add(id);
        selectedIds = next;
        selectedLinkId = null;
        linkArmed = selectedIds.size > 0;
        syncSelectionClasses();
      }

      function showEditingControls(boxId) {
        activeFormatBoxId = boxId;
        formatToolbar.hidden = false;
        updateActiveLineFromSelection();
        updateToolbarState();
        positionEditingControls();
      }

      function hideEditingControls() {
        formatToolbar.hidden = true;
        lineButton.hidden = true;
        clearControlHitZones();
        activeFormatBoxId = null;
        activeLineEl = null;
      }

      function positionEditingControls() {
        positionFormatToolbar();
        positionLineButton();
        syncControlHitZones();
      }

      function clearControlHitZones() {
        controlHitRecords = [];
        controlDownRecord = null;
        if (controlHitLayer) {
          controlHitLayer.hidden = true;
          controlHitLayer.replaceChildren();
        }
        setHitHoveredControl(null);
        document.body.classList.remove("control-hit");
      }

      function syncControlHitZones() {
        // No real overlay rectangles are created here. Older versions made one
        // merged transparent rectangle for the controls, and that rectangle could
        // cover the first editable line of the box. This version only stores
        // coordinate hit records and lets pointer events continue to the box.
        controlHitRecords = [];
        if (controlHitLayer) {
          controlHitLayer.hidden = true;
          controlHitLayer.replaceChildren();
        }

        const activeBox = activeFormatBoxId ? getBoxElement(activeFormatBoxId) : null;
        const activeBoxRect = activeBox ? activeBox.getBoundingClientRect() : null;

        const controls = [];
        if (!formatToolbar.hidden) {
          for (const button of formatToolbar.querySelectorAll("button[data-format]")) {
            const rect = button.getBoundingClientRect();
            if (rect.width > 0 && rect.height > 0) controls.push({ type: "format", button, rect });
          }
        }
        if (!lineButton.hidden) {
          const rect = lineButton.getBoundingClientRect();
          if (rect.width > 0 && rect.height > 0) controls.push({ type: "line", button: lineButton, rect });
        }

        const margin = CONTROL_HIT_MARGIN;
        controlHitRecords = controls.map(control => {
          const expanded = {
            left: control.rect.left - margin,
            top: control.rect.top - margin,
            right: control.rect.right + margin,
            bottom: control.rect.bottom + margin
          };

          // Keep the invisible margin outside the editable box itself.
          // Format buttons live above the box, so their margin cannot extend down into it.
          // The # button lives to the left, so its margin cannot extend right into it.
          if (activeBoxRect) {
            if (control.type === "format") expanded.bottom = Math.min(expanded.bottom, activeBoxRect.top - 1);
            if (control.type === "line") expanded.right = Math.min(expanded.right, activeBoxRect.left - 1);
          }

          // If clipping would invert a record, keep the visible button clickable.
          if (expanded.right < expanded.left) { expanded.left = control.rect.left; expanded.right = control.rect.right; }
          if (expanded.bottom < expanded.top) { expanded.top = control.rect.top; expanded.bottom = control.rect.bottom; }

          return { ...control, expanded };
        });
      }

      function getEditingControlAtPoint(clientX, clientY) {
        if (!controlHitRecords.length) return null;

        const activeBox = activeFormatBoxId ? getBoxElement(activeFormatBoxId) : null;
        if (activeBox) {
          const boxRect = activeBox.getBoundingClientRect();
          // The editable box wins over every invisible control margin.
          // This is what fixes first-line clicks: if the pointer is inside the
          // visible box, it is always treated as text editing, never background/control.
          if (clientX >= boxRect.left && clientX <= boxRect.right && clientY >= boxRect.top && clientY <= boxRect.bottom) {
            return null;
          }
        }

        const insideVisible = controlHitRecords.filter(record => (
          clientX >= record.rect.left && clientX <= record.rect.right &&
          clientY >= record.rect.top && clientY <= record.rect.bottom
        ));
        const choices = insideVisible.length ? insideVisible : controlHitRecords.filter(record => (
          clientX >= record.expanded.left && clientX <= record.expanded.right &&
          clientY >= record.expanded.top && clientY <= record.expanded.bottom
        ));
        if (!choices.length) return null;

        let best = choices[0];
        let bestDistance = Infinity;
        for (const record of choices) {
          const centerX = record.rect.left + record.rect.width / 2;
          const centerY = record.rect.top + record.rect.height / 2;
          const dx = clientX - centerX;
          const dy = clientY - centerY;
          const distance = dx * dx + dy * dy;
          if (distance < bestDistance) {
            best = record;
            bestDistance = distance;
          }
        }
        return best;
      }

      function rectsTouch(a, b) {
        return !(a.right < b.left || b.right < a.left || a.bottom < b.top || b.bottom < a.top);
      }

      function unionRects(a, b) {
        return {
          left: Math.min(a.left, b.left),
          top: Math.min(a.top, b.top),
          right: Math.max(a.right, b.right),
          bottom: Math.max(a.bottom, b.bottom)
        };
      }

      function chooseControlFromPoint(cluster, clientX, clientY) {
        const insideVisible = cluster.records.filter(record => (
          clientX >= record.rect.left && clientX <= record.rect.right &&
          clientY >= record.rect.top && clientY <= record.rect.bottom
        ));
        const choices = insideVisible.length ? insideVisible : cluster.records.filter(record => (
          clientX >= record.expanded.left && clientX <= record.expanded.right &&
          clientY >= record.expanded.top && clientY <= record.expanded.bottom
        ));
        if (!choices.length) return null;

        let best = choices[0];
        let bestDistance = Infinity;
        for (const record of choices) {
          const centerX = record.rect.left + record.rect.width / 2;
          const centerY = record.rect.top + record.rect.height / 2;
          const dx = clientX - centerX;
          const dy = clientY - centerY;
          const distance = dx * dx + dy * dy;
          if (distance < bestDistance) {
            best = record;
            bestDistance = distance;
          }
        }
        return best;
      }

      function addControlHitZone(cluster, vpRect) {
        const bounds = cluster.bounds;
        const zone = document.createElement("div");
        zone.className = "controlHitZone";
        zone.style.left = `${Math.floor(bounds.left - vpRect.left)}px`;
        zone.style.top = `${Math.floor(bounds.top - vpRect.top)}px`;
        zone.style.width = `${Math.max(1, Math.ceil(bounds.right - bounds.left))}px`;
        zone.style.height = `${Math.max(1, Math.ceil(bounds.bottom - bounds.top))}px`;

        const refreshHover = event => {
          const control = chooseControlFromPoint(cluster, event.clientX, event.clientY);
          setHitHoveredControl(control?.button || null);
          document.body.classList.toggle("control-hit", Boolean(control));
          return control;
        };

        zone.addEventListener("pointerenter", refreshHover);
        zone.addEventListener("pointermove", refreshHover);
        zone.addEventListener("pointerleave", () => {
          setHitHoveredControl(null);
          document.body.classList.remove("control-hit");
        });
        zone.addEventListener("pointerdown", event => {
          const control = refreshHover(event);
          if (event.button !== 0 || !control) return;
          event.preventDefault();
          event.stopPropagation();
          zone.__downControl = control;
        });
        zone.addEventListener("click", event => {
          const control = chooseControlFromPoint(cluster, event.clientX, event.clientY) || zone.__downControl;
          zone.__downControl = null;
          if (!control) return;
          event.preventDefault();
          event.stopPropagation();
          setHitHoveredControl(control.button);
          executeEditingControl(control);
        });
        zone.addEventListener("contextmenu", event => {
          event.preventDefault();
          event.stopPropagation();
        });
        controlHitLayer.appendChild(zone);
      }

      function positionFormatToolbar() {
        if (formatToolbar.hidden || !activeFormatBoxId) return;
        const element = getBoxElement(activeFormatBoxId);
        if (!element) return;
        const boxRect = element.getBoundingClientRect();
        const vpRect = viewport.getBoundingClientRect();
        const buttons = Array.from(formatToolbar.querySelectorAll("button[data-format]"));
        const buttonWidth = CONTROL_VISUAL_SIZE;
        const buttonHeight = CONTROL_VISUAL_SIZE;
        const gap = 3;
        const startLeft = Math.max(0, boxRect.left - vpRect.left);
        const top = Math.max(0, boxRect.top - vpRect.top - buttonHeight - 6);
        formatToolbar.style.left = "0px";
        formatToolbar.style.top = "0px";
        for (let i = 0; i < buttons.length; i += 1) {
          buttons[i].style.left = `${Math.round(startLeft + i * (buttonWidth + gap))}px`;
          buttons[i].style.top = `${Math.round(top)}px`;
        }
        syncControlHitZones();
      }

      function positionLineButton() {
        if (!activeFormatBoxId || !activeLineEl || document.activeElement !== getBoxElement(activeFormatBoxId)) {
          lineButton.hidden = true;
          syncControlHitZones();
          return;
        }
        const lineRect = activeLineEl.getBoundingClientRect();
        const box = getBoxElement(activeFormatBoxId);
        const boxRect = box.getBoundingClientRect();
        const vpRect = viewport.getBoundingClientRect();
        lineButton.hidden = false;
        const visualCenterY = lineRect.top - vpRect.top + (lineRect.height / 2);
        const left = boxRect.left - vpRect.left - CONTROL_VISUAL_SIZE - 6;
        const top = visualCenterY - (CONTROL_VISUAL_SIZE / 2);
        lineButton.style.left = `${Math.round(left)}px`;
        lineButton.style.top = `${Math.round(top)}px`;
        updateLineButtonState();
        syncControlHitZones();
      }

      function updateToolbarState() {
        if (!activeFormatBoxId) return;
        const box = getBoxElement(activeFormatBoxId);
        if (!box) return;
        for (const button of formatToolbar.querySelectorAll("button[data-format]")) {
          const command = commandForFormat(button.dataset.format);
          let active = false;
          try { active = document.queryCommandState(command); } catch (e) { active = false; }
          button.classList.toggle("active", Boolean(active));
        }
        updateLineButtonState();
      }

      function updateLineButtonState() {
        lineButton.classList.toggle("active", Boolean(activeLineEl?.classList?.contains("bigLine")));
      }

      function commandForFormat(format) {
        if (format === "strike") return "strikeThrough";
        return format;
      }

      function runFormatCommand(format) {
        const box = getBoxElement(activeFormatBoxId);
        const data = getBoxData(activeFormatBoxId);
        if (!box || !data) return;
        pushBoxUndoSnapshot(box);
        box.focus();
        document.execCommand(commandForFormat(format), false, null);
        afterBoxEdited(box, data, true);
      }

      function updateActiveLineFromSelection() {
        const box = getBoxElement(activeFormatBoxId);
        if (!box) return;
        const selection = document.getSelection();
        if (!selection || !selection.anchorNode || !box.contains(selection.anchorNode)) return;
        const line = closestLine(selection.anchorNode, box);
        if (line) activeLineEl = line;
      }

      function nppCharKind(char) {
        if (char === " " || char === "\t" || char === "\u00a0") return "space";
        try {
          if (/^[\p{L}\p{N}_]$/u.test(char)) return "word";
        } catch (e) {
          if (/^[A-Za-z0-9_]$/.test(char)) return "word";
        }
        return "punct";
      }

      function lineTextNodes(line) {
        const nodes = [];
        const walker = document.createTreeWalker(line, NodeFilter.SHOW_TEXT, null);
        let node;
        while ((node = walker.nextNode())) nodes.push(node);
        return nodes;
      }

      function lineOffsetFromDomPosition(line, node, offset) {
        try {
          const range = document.createRange();
          range.setStart(line, 0);
          range.setEnd(node, offset);
          return range.toString().length;
