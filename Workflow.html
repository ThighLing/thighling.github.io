        } catch (e) {
          return 0;
        }
      }

      function domPositionFromLineOffset(line, targetOffset) {
        const nodes = lineTextNodes(line);
        let remaining = Math.max(0, targetOffset);
        for (const node of nodes) {
          const length = node.nodeValue.length;
          if (remaining <= length) return { node, offset: remaining };
          remaining -= length;
        }
        const last = nodes[nodes.length - 1];
        if (last) return { node: last, offset: last.nodeValue.length };
        return { node: line, offset: line.childNodes.length };
      }

      function rangeFromPoint(clientX, clientY) {
        if (document.caretPositionFromPoint) {
          const pos = document.caretPositionFromPoint(clientX, clientY);
          if (!pos) return null;
          const range = document.createRange();
          range.setStart(pos.offsetNode, pos.offset);
          range.collapse(true);
          return range;
        }
        if (document.caretRangeFromPoint) return document.caretRangeFromPoint(clientX, clientY);
        return null;
      }

      function boxFromPointOrTarget(event) {
        const byTarget = event.target?.closest?.(".box");
        if (byTarget) return byTarget;
        for (const box of world.querySelectorAll(".box")) {
          const rect = box.getBoundingClientRect();
          if (
            event.clientX >= rect.left && event.clientX <= rect.right &&
            event.clientY >= rect.top && event.clientY <= rect.bottom
          ) return box;
        }
        return null;
      }

      function nppVisibleLineAtPoint(clientX, clientY, box) {
        if (!box) return null;
        const lines = Array.from(box.querySelectorAll(".textLine"));
        if (!lines.length) return null;

        const boxRect = box.getBoundingClientRect();
        const verticalPadding = 8;
        if (
          clientY < boxRect.top - verticalPadding ||
          clientY > boxRect.bottom + verticalPadding ||
          clientX < boxRect.left - 8 ||
          clientX > boxRect.right + 8
        ) return null;

        for (const line of lines) {
          const rect = line.getBoundingClientRect();
          if (clientY >= rect.top && clientY <= rect.bottom) return line;
        }

        let closest = null;
        let closestDistance = Infinity;
        for (const line of lines) {
          const rect = line.getBoundingClientRect();
          const centerY = rect.top + rect.height / 2;
          const distance = Math.abs(clientY - centerY);
          if (distance < closestDistance) {
            closest = line;
            closestDistance = distance;
          }
        }
        return closest;
      }

      function nppMonospaceCharWidth(element) {
        // Use the line's computed font, not the box font.  # lines are 32px,
        // while normal lines are 16px; using the box font made clicks on #
        // lines land too far to the right/left.  The returned width is in
        // screen pixels, matching getBoundingClientRect() after world zoom.
        const style = getComputedStyle(element);
        const probe = document.createElement("span");
        probe.textContent = "0000000000";
        probe.style.position = "absolute";
        probe.style.left = "-10000px";
        probe.style.top = "-10000px";
        probe.style.visibility = "hidden";
        probe.style.whiteSpace = "pre";
        probe.style.fontFamily = style.fontFamily;
        probe.style.fontSize = style.fontSize;
        probe.style.fontWeight = style.fontWeight;
        probe.style.fontStyle = style.fontStyle;
        probe.style.letterSpacing = style.letterSpacing;
        document.body.appendChild(probe);
        const width = probe.getBoundingClientRect().width / 10;
        probe.remove();
        return Math.max(1, width * zoom);
      }

      function nppTabSize(box) {
        const raw = getComputedStyle(box).tabSize || getComputedStyle(box).MozTabSize || "4";
        const parsed = parseFloat(raw);
        return Number.isFinite(parsed) && parsed > 0 ? parsed : 4;
      }

      function nppAdvanceForChar(char, column, tabSize) {
        if (char === "\t") {
          const remainder = column % tabSize;
          return remainder === 0 ? tabSize : tabSize - remainder;
        }
        return 1;
      }

      function nppTextVisualColumns(text, tabSize) {
        let column = 0;
        for (const char of text) column += nppAdvanceForChar(char, column, tabSize);
        return column;
      }

      function nppCharIndexFromPointOnLine(clientX, line, box) {
        const text = line.textContent || "";
        if (!text.length) return -1;

        const lineRect = line.getBoundingClientRect();
        const charWidth = nppMonospaceCharWidth(line);
        const tabSize = nppTabSize(box);
        const visualX = (clientX - lineRect.left) / charWidth;
        const totalColumns = nppTextVisualColumns(text, tabSize);

        // In Notepad++ a double click in virtual space after the actual line text
        // does not snap to the next/previous word. It only selects a run if the
        // mouse is over a real character cell, including space/tab cells.
        if (visualX < 0 || visualX >= totalColumns) return -1;

        let column = 0;
        for (let i = 0; i < text.length; i++) {
          const nextColumn = column + nppAdvanceForChar(text[i], column, tabSize);
          if (visualX < nextColumn) return i;
          column = nextColumn;
        }
        return -1;
      }

      function nppCaretOffsetFromPointOnLine(clientX, line, box) {
        const text = line.textContent || "";
        const lineRect = line.getBoundingClientRect();
        const charWidth = nppMonospaceCharWidth(line);
        const tabSize = nppTabSize(box);
        const visualX = (clientX - lineRect.left) / charWidth;

        if (!text.length || visualX <= 0) return 0;

        let column = 0;
        for (let i = 0; i < text.length; i++) {
          const nextColumn = column + nppAdvanceForChar(text[i], column, tabSize);
          const midpoint = (column + nextColumn) / 2;
          if (visualX < midpoint) return i;
          if (visualX < nextColumn) return i + 1;
          column = nextColumn;
        }
        return text.length;
      }

      function placeNppCaretAtPoint(clientX, clientY, box) {
        const pos = nppCaretPositionForDragPoint(clientX, clientY, box);
        const selection = document.getSelection();
        if (selection && pos) {
          const range = document.createRange();
          range.setStart(pos.node, pos.offset);
          range.collapse(true);
          selection.removeAllRanges();
          selection.addRange(range);
          activeLineEl = pos.line;
          activeFormatBoxId = box.dataset.id;
          selectedLinkId = null;
          box.focus({ preventScroll: true });
          showEditingControls(box.dataset.id);
          updateToolbarState();
          positionEditingControls();
          return true;
        }

        const fallbackRange = rangeFromPoint(clientX, clientY);
        if (fallbackRange && box.contains(fallbackRange.startContainer)) {
          fallbackRange.collapse(true);
          selection.removeAllRanges();
          selection.addRange(fallbackRange);
          activeFormatBoxId = box.dataset.id;
          selectedLinkId = null;
          box.focus({ preventScroll: true });
          showEditingControls(box.dataset.id);
          updateActiveLineFromSelection();
          updateToolbarState();
          positionEditingControls();
          return true;
        }
        return false;
      }

      function nppLineForSelectionDragPoint(clientX, clientY, box) {
        if (!box) return null;
        const lines = Array.from(box.querySelectorAll(".textLine"));
        if (!lines.length) return null;

        // When a monospace selection is dragged outside the editor, Notepad++
        // behaves as if the pointer is on the same horizontal side of the
        // nearest line, instead of letting the browser snap to background text.
        let bestLine = lines[0];
        let bestDistance = Infinity;
        for (const line of lines) {
          const rect = line.getBoundingClientRect();
          const centerY = rect.top + rect.height / 2;
          const distance = Math.abs(clientY - centerY);
          if (distance < bestDistance) {
            bestDistance = distance;
            bestLine = line;
          }
        }
        return bestLine;
      }

      function nppCaretPositionForDragPoint(clientX, clientY, box) {
        const line = nppLineForSelectionDragPoint(clientX, clientY, box);
        if (!line || !box.contains(line)) return null;

        const lineRect = line.getBoundingClientRect();
        const text = line.textContent || "";
        let offset;
        if (clientX <= lineRect.left) {
          offset = 0;
        } else if (clientX >= lineRect.right) {
          offset = text.length;
        } else {
          offset = nppCaretOffsetFromPointOnLine(clientX, line, box);
        }
        const pos = domPositionFromLineOffset(line, offset);
        return { ...pos, line, offset };
      }

      function selectBetweenNppPositions(anchorPos, currentPos) {
        if (!anchorPos || !currentPos) return false;
        let startPos = anchorPos;
        let endPos = currentPos;
        if (compareDomPositions(currentPos, anchorPos) < 0) {
          startPos = currentPos;
          endPos = anchorPos;
        }
        const range = document.createRange();
        range.setStart(startPos.node, startPos.offset);
        range.setEnd(endPos.node, endPos.offset);
        const selection = document.getSelection();
        selection.removeAllRanges();
        selection.addRange(range);
        activeLineEl = currentPos.line;
        updateToolbarState();
        positionEditingControls();
        return true;
      }

      function nppRunAtPoint(clientX, clientY, box) {
        const line = nppVisibleLineAtPoint(clientX, clientY, box) || lineFromExtendedPoint(clientX, clientY, box);
        if (!line || !box.contains(line)) return null;

        const text = line.textContent || "";
        if (!text.length) return null;

        const index = nppCharIndexFromPointOnLine(clientX, line, box);
        if (index < 0) return null;

        const kind = nppCharKind(text[index]);
        let start = index;
        let end = index + 1;
        while (start > 0 && nppCharKind(text[start - 1]) === kind) start -= 1;
        while (end < text.length && nppCharKind(text[end]) === kind) end += 1;

        const startPos = domPositionFromLineOffset(line, start);
        const endPos = domPositionFromLineOffset(line, end);
        return { box, line, kind, start, end, startPos, endPos };
      }

      function nppRunForSelectionDragPoint(clientX, clientY, box) {
        const line = nppLineForSelectionDragPoint(clientX, clientY, box);
        if (!line || !box.contains(line)) return null;

        const text = line.textContent || "";
        if (!text.length) return null;

        let index = nppCharIndexFromPointOnLine(clientX, line, box);
        if (index < 0) {
          const lineRect = line.getBoundingClientRect();
          // During a Notepad++-style double-click drag, leaving the box above,
          // below, left, or right should still resolve to the nearest sensible
          // run on the nearest line, not stop updating the selection.
          if (clientX <= lineRect.left) index = 0;
          else if (clientX >= lineRect.right) index = text.length - 1;
          else return null;
        }

        const kind = nppCharKind(text[index]);
        let start = index;
        let end = index + 1;
        while (start > 0 && nppCharKind(text[start - 1]) === kind) start -= 1;
        while (end < text.length && nppCharKind(text[end]) === kind) end += 1;

        const startPos = domPositionFromLineOffset(line, start);
        const endPos = domPositionFromLineOffset(line, end);
        return { box, line, kind, start, end, startPos, endPos };
      }

      function compareDomPositions(a, b) {
        const rangeA = document.createRange();
        const rangeB = document.createRange();
        rangeA.setStart(a.node, a.offset);
        rangeA.collapse(true);
        rangeB.setStart(b.node, b.offset);
        rangeB.collapse(true);
        return rangeA.compareBoundaryPoints(Range.START_TO_START, rangeB);
      }

      function selectBetweenNppRuns(anchorRun, currentRun) {
        if (!anchorRun || !currentRun || anchorRun.box !== currentRun.box) return false;

        let startPos = anchorRun.startPos;
        let endPos = currentRun.endPos;
        if (compareDomPositions(currentRun.startPos, anchorRun.startPos) < 0) {
          startPos = currentRun.startPos;
          endPos = anchorRun.endPos;
        }

        const selectionRange = document.createRange();
        selectionRange.setStart(startPos.node, startPos.offset);
        selectionRange.setEnd(endPos.node, endPos.offset);
        const selection = document.getSelection();
        selection.removeAllRanges();
        selection.addRange(selectionRange);
        activeLineEl = currentRun.line;
        updateToolbarState();
        positionEditingControls();
        return true;
      }

      function selectNppRunAtPoint(event, box) {
        const run = nppRunAtPoint(event.clientX, event.clientY, box);
        if (!run) return false;
        return selectBetweenNppRuns(run, run);
      }

      function nppLineAtPoint(clientX, clientY, box) {
        const line = nppVisibleLineAtPoint(clientX, clientY, box) || lineFromExtendedPoint(clientX, clientY, box);
        if (!line || !box.contains(line)) return null;
        return line;
      }

      function lineStartPosition(line) {
        return { node: line, offset: 0 };
      }

      function lineEndPosition(line) {
        return { node: line, offset: line.childNodes.length };
      }

      function selectBetweenNppLines(anchorLine, currentLine, box) {
        if (!anchorLine || !currentLine || !box || !box.contains(anchorLine) || !box.contains(currentLine)) return false;

        let startLine = anchorLine;
        let endLine = currentLine;
        if (compareDomPositions(lineStartPosition(currentLine), lineStartPosition(anchorLine)) < 0) {
          startLine = currentLine;
          endLine = anchorLine;
        }

        const selectionRange = document.createRange();
        // Selecting the line elements themselves gives Notepad++-style line
        // selection more reliably in contenteditable than selecting only the
        // child text nodes, especially when the line has formatting elements.
        selectionRange.setStartBefore(startLine);
        selectionRange.setEndAfter(endLine);
        const selection = document.getSelection();
        selection.removeAllRanges();
        selection.addRange(selectionRange);
        activeLineEl = currentLine;
        updateToolbarState();
        positionEditingControls();
        return true;
      }

      function startNppLineDragSelection(event, box) {
        event.preventDefault();
        event.stopPropagation();
        event.stopImmediatePropagation?.();
        activeFormatBoxId = box.dataset.id;
        selectedLinkId = null;
        box.focus({ preventScroll: true });
        showEditingControls(box.dataset.id);
        const line = nppLineAtPoint(event.clientX, event.clientY, box);
        if (!line) return false;
        selectBetweenNppLines(line, line, box);
        nppSuppressDblClickUntil = performance.now() + 700;
        nppLineDragState = {
          pointerId: event.pointerId,
          box,
          anchorLine: line,
          currentLine: line,
          moved: false
        };
        try { box.setPointerCapture(event.pointerId); } catch (e) {}
        return true;
      }

      function startNppRunDragSelection(event, box) {
        event.preventDefault();
        event.stopPropagation();
        event.stopImmediatePropagation?.();
        activeFormatBoxId = box.dataset.id;
        selectedLinkId = null;
        box.focus({ preventScroll: true });
        showEditingControls(box.dataset.id);
        const run = nppRunAtPoint(event.clientX, event.clientY, box);
        if (!run) return false;
        selectBetweenNppRuns(run, run);
        nppRunDragState = {
          pointerId: event.pointerId,
          box,
          anchorRun: run,
          currentRun: run,
          moved: false
        };
        try { box.setPointerCapture(event.pointerId); } catch (e) {}
        return true;
      }

      document.addEventListener("pointerdown", event => {
        if (!currentInstance().monospace) return;
        if (event.button !== 0) return;
        if (isEditingControlTarget(event.target)) return;
        const box = boxFromPointOrTarget(event);
        if (!box) return;

        const now = performance.now();
        const sameSpot = nppPointerHistory &&
          nppPointerHistory.boxId === box.dataset.id &&
          now - nppPointerHistory.time < 550 &&
          Math.hypot(event.clientX - nppPointerHistory.x, event.clientY - nppPointerHistory.y) < 8;

        // PointerEvent.detail is not reliable in every browser. Track the
        // repeated-click count ourselves so the 4th click is truly the same
        // as the 1st click, instead of accidentally behaving like another
        // double-click whitespace/run selection.
        const clickCount = sameSpot ? (Number(nppPointerHistory.clickCount) || 1) + 1 : 1;
        const stage = ((clickCount - 1) % 3) + 1;

        nppPointerHistory = {
          boxId: box.dataset.id,
          time: now,
          x: event.clientX,
          y: event.clientY,
          clickCount
        };

        if (stage === 3) {
          nppCaretDragState = null;
          nppRunDragState = null;
          startNppLineDragSelection(event, box);
          return;
        }

        if (stage === 2) {
          nppCaretDragState = null;
          startNppRunDragSelection(event, box);
          return;
        }

        // 1st, 4th, 7th... click should be a normal caret click, but a drag
        // from that click should still select like a monospace editor. Using
        // our own caret drag also lets selection continue outside the box by
        // clamping horizontally to the left/right side of the nearest line.
        nppRunDragState = null;
        nppLineDragState = null;
        event.preventDefault();
        event.stopPropagation();
        event.stopImmediatePropagation?.();
        const anchorPos = nppCaretPositionForDragPoint(event.clientX, event.clientY, box);
        if (anchorPos) {
          placeNppCaretAtPoint(event.clientX, event.clientY, box);
          nppCaretDragState = {
            pointerId: event.pointerId,
            box,
            anchorPos,
            currentPos: anchorPos,
            startX: event.clientX,
            startY: event.clientY,
            moved: false
          };
          try { box.setPointerCapture(event.pointerId); } catch (e) {}
        }
        nppSuppressDblClickUntil = clickCount > 1 ? performance.now() + 700 : performance.now() + 260;
        return;
      }, true);

      document.addEventListener("dblclick", event => {
        if (!currentInstance().monospace) return;
        if (event.button !== 0) return;
        if (isEditingControlTarget(event.target)) return;
        const box = boxFromPointOrTarget(event);
        if (!box) return;

        const stage = nppClickStage(event, false);
        if (performance.now() < nppSuppressDblClickUntil || stage !== 2) {
          // Prevent the browser dblclick fallback from changing the custom
          // Notepad++ selection after a 3rd/4th click sequence.
          event.preventDefault();
          event.stopPropagation();
          event.stopImmediatePropagation?.();

        event.preventDefault();
        event.stopPropagation();
        activeFormatBoxId = box.dataset.id;
        selectedLinkId = null;
        box.focus({ preventScroll: true });
        showEditingControls(box.dataset.id);
        selectNppRunAtPoint(event, box);
      }, true);

      document.addEventListener("click", event => {
        if (!currentInstance().monospace) return;
        if (event.button !== 0) return;
        if (nppClickStage(event, false) !== 3) return;
        if (isEditingControlTarget(event.target)) return;
        const box = boxFromPointOrTarget(event);
        if (!box) return;

        event.preventDefault();
        event.stopPropagation();
        event.stopImmediatePropagation?.();
        activeFormatBoxId = box.dataset.id;
        selectedLinkId = null;
        box.focus({ preventScroll: true });

        const line = nppLineAtPoint(event.clientX, event.clientY, box);
        if (line) selectBetweenNppLines(line, line, box);

      function closestLine(node, box) {
        let el = node.nodeType === Node.ELEMENT_NODE ? node : node.parentElement;
        while (el && el !== box) {
          if (el.classList?.contains("textLine")) return el;
          el = el.parentElement;
        }
        return null;
      }

      function lineFromPoint(clientX, clientY, box) {
        let range = null;
        if (document.caretPositionFromPoint) {
          const pos = document.caretPositionFromPoint(clientX, clientY);
          if (pos) {
            range = document.createRange();
            range.setStart(pos.offsetNode, pos.offset);
          }
        } else if (document.caretRangeFromPoint) {
          range = document.caretRangeFromPoint(clientX, clientY);

          const line = closestLine(range.startContainer, box);
          if (line) return line;
        }
        for (const el of document.elementsFromPoint(clientX, clientY)) {
          if (el === box || box.contains(el)) {
            const line = el.classList?.contains("textLine") ? el : el.closest?.(".textLine");
            if (line && box.contains(line)) return line;
          }
        }
        return null;
      }

      function lineFromExtendedPoint(clientX, clientY, box) {
        const boxRect = box.getBoundingClientRect();
        const leftReach = 90;
        const rightReach = 14;
        const verticalReach = 8;
        const insideExtendedBand = (
          clientX >= boxRect.left - leftReach &&
          clientX <= boxRect.right + rightReach &&
          clientY >= boxRect.top - verticalReach &&
          clientY <= boxRect.bottom + verticalReach
        );
        if (!insideExtendedBand) return null;

        if (clientX >= boxRect.left && clientX <= boxRect.right) {
          const direct = lineFromPoint(clientX, clientY, box);
          if (direct) return direct;
        }

        const lines = Array.from(box.querySelectorAll(".textLine"));
        let closest = null;
        let closestDistance = Infinity;
        for (const line of lines) {
          const rect = line.getBoundingClientRect();
          const centerY = rect.top + rect.height / 2;
          const distance = Math.abs(clientY - centerY);
          if (distance < closestDistance) {
            closest = line;
            closestDistance = distance;
          }
        }
        return closest;
      }

      function updateLineHoverFromPointer(event) {
        if (!activeFormatBoxId || dragState || panState || selectState) return;
        if (isEditingControlTarget(event.target)) return;
        const box = getBoxElement(activeFormatBoxId);
        if (!box || document.activeElement !== box) return;
        const line = lineFromExtendedPoint(event.clientX, event.clientY, box);
        if (!line) return;
        activeLineEl = line;
        positionLineButton();
        updateLineButtonState();
      }

      function setWholeLineBold(line, shouldBold) {
        if (!line) return;
        if (shouldBold) {
          const childNodes = Array.from(line.childNodes);
          const alreadyOneBoldWrapper = childNodes.length === 1 &&
            childNodes[0].nodeType === Node.ELEMENT_NODE &&
            ["B", "STRONG"].includes(childNodes[0].tagName);

            while (line.firstChild) wrapper.appendChild(line.firstChild);
            line.appendChild(wrapper);

          return;

          while (boldNode.firstChild) boldNode.parentNode.insertBefore(boldNode.firstChild, boldNode);
          boldNode.remove();
        }
      }

      // First line # is intentionally a creation-time default only.
      // Existing boxes must not be re-forced to # on edit/render, so users can un-# the first line normally.
      function applyAutoFirstLineHash(box) {
        return false;
      }

      function applyAutoFirstLineHashToRenderedBoxes() {
        // No-op by design. The setting only affects newly created boxes.
      }

      function toggleCurrentLineBig() {
        const box = getBoxElement(activeFormatBoxId);
        const data = getBoxData(activeFormatBoxId);
        if (!box || !data) return;
        if (!activeLineEl || !box.contains(activeLineEl)) return;
        pushBoxUndoSnapshot(box);
        const isNowBig = activeLineEl.classList.toggle("bigLine");
        if (currentInstance().hashAutoBold) {
          setWholeLineBold(activeLineEl, isNowBig);
        }
        normalizeBoxLines(box);
        afterBoxEdited(box, data, true);
        box.focus();
      }

      function insertPlainTextWithLines(text) {
        const selection = document.getSelection();
        if (!selection || !selection.rangeCount) return;
        selection.deleteFromDocument();
        const lines = String(text).split("\n");
        for (let i = 0; i < lines.length; i++) {
          if (i > 0) document.execCommand("insertHTML", false, '<div class="textLine"><br></div>');
          if (lines[i]) document.execCommand("insertText", false, lines[i]);
        }
      }

      function placeCaretAtEnd(element) {
        element.focus();
        const range = document.createRange();
        range.selectNodeContents(element);
        range.collapse(false);
        const selection = document.getSelection();
        selection.removeAllRanges();
        selection.addRange(range);
      }

      document.addEventListener("pointermove", event => {
        if (nppCaretDragState && event.pointerId === nppCaretDragState.pointerId) {
          event.preventDefault();
          event.stopPropagation();

          const dy = event.clientY - nppCaretDragState.startY;
          if (!nppCaretDragState.moved && Math.hypot(dx, dy) > 2) {
            nppCaretDragState.moved = true;
          }
          const currentPos = nppCaretPositionForDragPoint(event.clientX, event.clientY, nppCaretDragState.box);
          if (currentPos) {

          return;
        }

        if (nppLineDragState && event.pointerId === nppLineDragState.pointerId) {
          event.preventDefault();
          event.stopPropagation();
          const currentLine = nppLineForSelectionDragPoint(event.clientX, event.clientY, nppLineDragState.box);
          if (currentLine) {
            nppLineDragState.currentLine = currentLine;
            nppLineDragState.moved = true;

          return;
        }

        if (nppRunDragState && event.pointerId === nppRunDragState.pointerId) {
          event.preventDefault();
          event.stopPropagation();
          const currentRun = nppRunForSelectionDragPoint(event.clientX, event.clientY, nppRunDragState.box);
          if (currentRun) {

            nppRunDragState.moved = true;

          const screenDx = event.clientX - dragState.startX;
          const screenDy = event.clientY - dragState.startY;
          const distance = Math.hypot(screenDx, screenDy);
          if (!dragState.moved && distance > DRAG_THRESHOLD) {
            dragState.moved = true;
            linkArmed = false;
            document.activeElement?.blur?.();
            dragState.element.classList.add("draggingBox");
            document.body.classList.add("noSelect");
            syncSelectionClasses();
          }
          if (dragState.moved) {
            const dx = screenDx / zoom;
            const dy = screenDy / zoom;
            for (const id of dragState.ids) {
              const data = getBoxData(id);
              const original = dragState.originals.get(id);
              const element = getBoxElement(id);
              if (!data || !original || !element) continue;
              data.x = Math.round(original.x + dx);
              data.y = Math.round(original.y + dy);
              placeBox(element, data.x, data.y);
            }
            renderLines();
            scheduleSave(true, false);
          }
        }

        if (panState && event.pointerId === panState.pointerId) {
          event.preventDefault();
          panState.lastClientX = event.clientX;
          panState.lastClientY = event.clientY;
          const totalDx = event.clientX - panState.startX;
          const totalDy = event.clientY - panState.startY;
          if (!panState.moved && Math.hypot(totalDx, totalDy) > DRAG_THRESHOLD) {
            panState.moved = true;
            document.body.classList.add("noSelect");
          }
          setViewKeepingWorldAtClient(panState.grabWorld, event.clientX, event.clientY);
          applyView();
          saveCurrentView(false);
        }

        if (selectState && event.pointerId === selectState.pointerId) {
          selectState.currentViewport = screenToViewport(event.clientX, event.clientY);
          const dx = event.clientX - selectState.startClient.x;
          const dy = event.clientY - selectState.startClient.y;
          if (!selectState.moved && Math.hypot(dx, dy) > DRAG_THRESHOLD) {
            selectState.moved = true;
            viewport.classList.add("selecting");
            document.body.classList.add("noSelect");
          }
          if (selectState.moved) {
            updateMarqueeVisual();
            updateSelectionFromMarquee();
          }
        }
      });

      document.addEventListener("pointerup", event => {
        if (nppCaretDragState && event.pointerId === nppCaretDragState.pointerId) {
          event.preventDefault();
          event.stopPropagation();
          event.stopImmediatePropagation?.();
          const wasNppCaretSelectionDrag = nppCaretDragState.moved;
          if (nppCaretDragState.moved && nppCaretDragState.currentPos) {
            selectBetweenNppPositions(nppCaretDragState.anchorPos, nppCaretDragState.currentPos);
          } else {
            placeNppCaretAtPoint(event.clientX, event.clientY, nppCaretDragState.box);
          }
          try { nppCaretDragState.box.releasePointerCapture(nppCaretDragState.pointerId); } catch (e) {}
          nppCaretDragState = null;
          if (wasNppCaretSelectionDrag) {
            // After a drag-selection, the next click should behave like a fresh
            // first click. Without clearing this, repeated-click tracking can
            // treat the next click on the selected text as a double-click/run
            // selection, making it feel like the click did nothing.
            nppPointerHistory = null;
            nppSuppressDblClickUntil = performance.now() + 260;
          }
          return;
        }

        if (nppLineDragState && event.pointerId === nppLineDragState.pointerId) {
          event.preventDefault();
          event.stopPropagation();
          event.stopImmediatePropagation?.();
          const wasNppLineSelectionDrag = nppLineDragState.moved;
          if (nppLineDragState.currentLine) {
            selectBetweenNppLines(nppLineDragState.anchorLine, nppLineDragState.currentLine, nppLineDragState.box);
          }
          nppSuppressDblClickUntil = performance.now() + 700;
          try { nppLineDragState.box.releasePointerCapture(nppLineDragState.pointerId); } catch (e) {}
          nppLineDragState = null;
          if (wasNppLineSelectionDrag) nppPointerHistory = null;
          return;
        }

        if (nppRunDragState && event.pointerId === nppRunDragState.pointerId) {
          event.preventDefault();
          event.stopPropagation();
          event.stopImmediatePropagation?.();
          const wasNppRunSelectionDrag = nppRunDragState.moved;
          if (nppRunDragState.currentRun) {
            selectBetweenNppRuns(nppRunDragState.anchorRun, nppRunDragState.currentRun);
          }
          if (nppRunDragState.moved) {
            nppSuppressDblClickUntil = performance.now() + 700;
          }
          try { nppRunDragState.box.releasePointerCapture(nppRunDragState.pointerId); } catch (e) {}
          nppRunDragState = null;
          if (wasNppRunSelectionDrag) nppPointerHistory = null;
          return;
        }

        if (dragState && event.pointerId === dragState.pointerId) {
          const wasMoved = dragState.moved;
          const element = dragState.element;
          try { element.releasePointerCapture(dragState.pointerId); } catch (e) {}
          element.classList.remove("draggingBox");
          document.body.classList.remove("noSelect");
          dragState = null;
          if (wasMoved) {
            linkArmed = false;
            saveNow(true);
            renderInstanceList();
          } else {
            linkArmed = selectedIds.size > 0;
          }
          syncSelectionClasses();
        }

        if (panState && event.pointerId === panState.pointerId) {
          const wasMoved = panState.moved;
          try { viewport.releasePointerCapture(panState.pointerId); } catch (e) {}
          viewport.classList.remove("panning");
          document.body.classList.remove("noSelect");
          panState = null;
          if (!wasMoved) {
            clearSelection();
            syncSelectionClasses();
            renderLines();
          }
          saveNow(false);
        }

        if (selectState && event.pointerId === selectState.pointerId) {
          try { viewport.releasePointerCapture(selectState.pointerId); } catch (e) {}
          if (!selectState.moved && !selectState.additive) {
            clearSelection();
            syncSelectionClasses();
          }
          marquee.style.display = "none";
          viewport.classList.remove("selecting");
          document.body.classList.remove("noSelect");
          selectState = null;
        }
      });

      viewport.addEventListener("pointerdown", event => {
        const onBox = event.target.closest && event.target.closest(".box");
        const onLink = event.target.closest && event.target.closest(".linkHit");
        const insideBoxByCoords = pointInsideAnyBox(event.clientX, event.clientY, 8);
        if (onBox || insideBoxByCoords || onLink || isEditingControlTarget(event.target)) return;

        if (event.button === 0) {
          hideInstanceMenu();
          document.activeElement?.blur?.();
          clearBrowserTextSelection();
          hideEditingControls();
          event.preventDefault();
          const grabWorld = screenToWorld(event.clientX, event.clientY);
          panState = { pointerId: event.pointerId, grabWorld, startX: event.clientX, startY: event.clientY, lastClientX: event.clientX, lastClientY: event.clientY, moved: false };
          try { viewport.setPointerCapture(event.pointerId); } catch (e) {}
          viewport.classList.add("panning");
          return;
        }

        if (event.button === 2) {
          hideInstanceMenu();
          event.preventDefault();
          document.activeElement?.blur?.();
          clearBrowserTextSelection();
          hideEditingControls();
          const additive = event.ctrlKey || event.metaKey;
          selectedLinkId = null;
          if (!additive) {
            selectedIds.clear();
            linkArmed = false;
            syncSelectionClasses();
          }
          const startViewport = screenToViewport(event.clientX, event.clientY);
          selectState = { pointerId: event.pointerId, startClient: { x: event.clientX, y: event.clientY }, startViewport, currentViewport: startViewport, baseIds: new Set(selectedIds), additive, moved: false };
          try { viewport.setPointerCapture(event.pointerId); } catch (e) {}
        }
      });

      viewport.addEventListener("mousemove", updateLineHoverFromPointer);

      function isNonCanvasUiTarget(target) {
        return Boolean(target?.closest?.(
          "button, input, select, textarea, label, #sidebar, #instanceMenu, .instanceItem, #formatToolbar, #lineButton, #controlHitLayer, #marquee"
        ));
      }

      function isTrueBackgroundDoubleClick(event) {
        const target = event.target;
        if (!target) return false;

        // The formatting controls use invisible coordinate hit margins. If a
        // double-click lands inside one of those margins, the browser target can
        // still be the viewport/background, so block box creation by coordinates too.
        if (getEditingControlAtPoint(event.clientX, event.clientY)) return false;
        if (isNonCanvasUiTarget(target)) return false;

        // If either click of the double-click happened in a box, do not create a
        // new box. This specifically fixes the first line/padding area of editable
        // boxes being interpreted as the background by some browsers.
        const recentBoxPointerDown =
          performance.now() - lastPointerDownInsideBox.time < 700 &&
          Math.abs(event.clientX - lastPointerDownInsideBox.x) < 12 &&
          Math.abs(event.clientY - lastPointerDownInsideBox.y) < 12;
        if (recentBoxPointerDown) return false;

        if (pointInsideAnyBox(event.clientX, event.clientY, 10)) return false;
        if (target.closest && (
          target.closest(".box") ||
          target.closest(".box *") ||
          target.closest(".linkHit")
        )) return false;
        return target === viewport || target === world;
      }

      viewport.addEventListener("dblclick", event => {
        if (getEditingControlAtPoint(event.clientX, event.clientY) || isNonCanvasUiTarget(event.target)) {
          event.preventDefault();
          event.stopPropagation();
          event.stopImmediatePropagation?.();
          return;
        }
        if (pointInsideAnyBox(event.clientX, event.clientY, 10)) {
          event.preventDefault();
          event.stopPropagation();
          return;
        }
        if (!isTrueBackgroundDoubleClick(event)) return;
        event.preventDefault();
        clearBrowserTextSelection();
        createBoxAt(event.clientX, event.clientY);
      }, true);

      viewport.addEventListener("contextmenu", event => { event.preventDefault(); });

      viewport.addEventListener("lostpointercapture", () => {
        if (panState) {
          viewport.classList.remove("panning");
          document.body.classList.remove("noSelect");
          panState = null;
        }
        if (selectState) {
          marquee.style.display = "none";
          viewport.classList.remove("selecting");
          document.body.classList.remove("noSelect");
          selectState = null;
        }
      });

      viewport.addEventListener("wheel", event => {
        event.preventDefault();
        hideInstanceMenu();
        const nextZoom = clamp(zoom * Math.exp(-event.deltaY * 0.001), MIN_ZOOM, MAX_ZOOM);
        if (panState) {
          zoom = nextZoom;
          panState.lastClientX = event.clientX;
          panState.lastClientY = event.clientY;
          setViewKeepingWorldAtClient(panState.grabWorld, event.clientX, event.clientY);
        } else {
          const cursorWorld = screenToWorld(event.clientX, event.clientY);
          zoom = nextZoom;
          setViewKeepingWorldAtClient(cursorWorld, event.clientX, event.clientY);
        }
        applyView();
        saveCurrentView(false);
      }, { passive: false });

      document.addEventListener("selectionchange", () => {
        const box = getBoxElement(activeFormatBoxId);
        const selection = document.getSelection();
        if (!box || !selection || !selection.anchorNode || !box.contains(selection.anchorNode)) return;
        updateToolbarState();
        updateActiveLineFromSelection();
        positionEditingControls();
      });

      document.addEventListener("keydown", event => {
        const active = document.activeElement;
        const typing = active && (active.tagName === "INPUT" || active.isContentEditable);
        if (event.key === "Escape") {
          hideInstanceMenu();
          clearSelection();
          syncSelectionClasses();
          renderLines();
          if (active?.isContentEditable) active.blur();
          return;
        }
        if ((event.key === "Delete" || event.key === "Backspace") && !typing) {
          if (selectedLinkId) {
            event.preventDefault();
            deleteSelectedLink();
            return;
          }
          if (selectedIds.size) {
            event.preventDefault();
            deleteSelectedBoxes();
          }
        }
      });

      document.addEventListener("contextmenu", event => { event.preventDefault(); });

      let hitHoveredControlButton = null;

      function setHitHoveredControl(button) {
        if (hitHoveredControlButton === button) return;
        if (hitHoveredControlButton) hitHoveredControlButton.classList.remove("hit-hover");
        hitHoveredControlButton = button || null;
        if (hitHoveredControlButton) hitHoveredControlButton.classList.add("hit-hover");
      }

      function executeEditingControl(control) {
        if (!control) return;
        if (control.type === "format") runFormatCommand(control.button.dataset.format);
        else toggleCurrentLineBig();
      }

      formatToolbar.addEventListener("pointerdown", event => {
        const button = event.target.closest?.("button[data-format]");
        if (!button) return;
        // Keep focus/selection in the editable box; otherwise execCommand can look
        // like a background click because the button steals focus first.
        event.preventDefault();
        event.stopPropagation();
        controlDownRecord = { type: "format", button, rect: button.getBoundingClientRect(), expanded: button.getBoundingClientRect() };
        setHitHoveredControl(button);
      }, true);

      formatToolbar.addEventListener("click", event => {
        const button = event.target.closest("button[data-format]") || controlDownRecord?.button;
        if (!button || !activeFormatBoxId) return;
        event.preventDefault();
        event.stopPropagation();
        controlDownRecord = null;
        setHitHoveredControl(button);
        runFormatCommand(button.dataset.format);
      }, true);

      formatToolbar.addEventListener("dblclick", event => {
        if (!event.target.closest?.("button[data-format]")) return;
        event.preventDefault();
        event.stopPropagation();
        event.stopImmediatePropagation?.();
      }, true);

      lineButton.addEventListener("pointerdown", event => {
        event.preventDefault();
        event.stopPropagation();
        controlDownRecord = { type: "line", button: lineButton, rect: lineButton.getBoundingClientRect(), expanded: lineButton.getBoundingClientRect() };
        setHitHoveredControl(lineButton);
      }, true);

      lineButton.addEventListener("click", event => {
        event.preventDefault();
        event.stopPropagation();
        controlDownRecord = null;
        setHitHoveredControl(lineButton);
        toggleCurrentLineBig();
      }, true);

      lineButton.addEventListener("dblclick", event => {
        event.preventDefault();
        event.stopPropagation();
        event.stopImmediatePropagation?.();
      }, true);

      document.addEventListener("pointermove", event => {
        const control = getEditingControlAtPoint(event.clientX, event.clientY);
        setHitHoveredControl(control?.button || null);
        document.body.classList.toggle("control-hit", Boolean(control));
      }, true);

      document.addEventListener("pointerdown", event => {
        if (event.button !== 0) return;
        const control = getEditingControlAtPoint(event.clientX, event.clientY);
        if (!control) return;
        event.preventDefault();
        event.stopPropagation();
        controlDownRecord = control;
        setHitHoveredControl(control.button);
      }, true);

      document.addEventListener("click", event => {
        const downControl = controlDownRecord;
        const upControl = getEditingControlAtPoint(event.clientX, event.clientY);
        controlDownRecord = null;

        // Only activate an editing control if the click STARTED on that control
        // or inside that control's invisible hit margin. This prevents a text
        // selection drag that starts inside a box and releases over B/I/U/S/#
        // from being treated as a formatting-button click.
        if (!downControl) return;

        // If the pointer was released over another expanded control area, use
        // the closest control at release time. Otherwise, do not fire anything;
        // this matches normal button behavior where dragging off cancels.
        const control = upControl || null;
        if (!control) return;

        event.preventDefault();
        event.stopPropagation();
        event.stopImmediatePropagation?.();
        setHitHoveredControl(control.button);
        executeEditingControl(control);
      }, true);

      document.addEventListener("pointerdown", event => {
        const insideBoxByTarget = event.target.closest?.(".box");
        const insideBoxByCoords = pointInsideAnyBox(event.clientX, event.clientY, 8);
        if (insideBoxByTarget || insideBoxByCoords || isEditingControlTarget(event.target)) return;
        clearBrowserTextSelection();
      }, true);

      document.addEventListener("pointerdown", event => {
        if (!instanceMenu.hidden && !instanceMenu.contains(event.target)) hideInstanceMenu();
      });

      instanceMenu.addEventListener("contextmenu", event => {
        event.preventDefault();
        event.stopPropagation();
      });

      instanceMenu.addEventListener("pointerdown", event => { event.stopPropagation(); });

      renameInstanceButton.addEventListener("click", () => {
        const id = instanceMenuTargetId;
        hideInstanceMenu();
        beginRenameById(id);
      });

      duplicateInstanceButton.addEventListener("click", () => {
        const instance = store.instances.find(item => item.id === instanceMenuTargetId);
        hideInstanceMenu();
        duplicateInstance(instance);
      });

      deleteInstanceButton.addEventListener("click", () => {
        const instance = store.instances.find(item => item.id === instanceMenuTargetId);
        hideInstanceMenu();
        deleteInstance(instance);
      });

      newForm.addEventListener("submit", event => {
        event.preventDefault();
        const requestedName = newName.value;
        const sourceInstance = currentInstance();
        const instance = blankInstance(uniqueName(requestedName), {
          monospace: Boolean(sourceInstance.monospace),
          hashAutoBold: Boolean(sourceInstance.hashAutoBold),
          firstLineHash: Boolean(sourceInstance.firstLineHash)
        });
        store.instances.push(instance);
        store.currentId = instance.id;
        clearSelection();
        hideEditingControls();
        saveNow(false);
        loadCurrentView();
        renderAll();
        newName.value = requestedName || BASE_NAME;
      });

      sortSelect.addEventListener("change", () => {
        store.sort = sortSelect.value;
        saveNow(false);
        renderInstanceList();
      });

      monospaceToggle.addEventListener("change", () => {
        const inst = currentInstance();
        inst.monospace = monospaceToggle.checked;
        saveNow(false);
        syncInstanceControls();
        renderBoxes();
        renderLines();
        positionEditingControls();
      });

      autoBoldToggle.addEventListener("change", () => {
        const inst = currentInstance();
        inst.hashAutoBold = autoBoldToggle.checked;
        saveNow(false);
        syncInstanceControls();
      });

      firstLineHashToggle.addEventListener("change", () => {
        const inst = currentInstance();
        inst.firstLineHash = firstLineHashToggle.checked;
        saveNow(false);
        syncInstanceControls();
      });

      window.addEventListener("beforeunload", () => saveNow(false));

      loadCurrentView();
      renderAll();
      saveNow(false);
    })();
  </script>
</body>
</html>
